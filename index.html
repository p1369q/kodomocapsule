<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>コドモカプセル [v65]</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght=400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{--bg:#F7F4EE;--card:#FFFFFF;--ink:#1E293B;--muted:#64748B;--accent:#FF6B6B;--accent-dark:#E55B5B;--gold:#D6B25E;--border:#E7E1D7;--danger:#D66A5E;}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{margin:0;padding:0;background:var(--bg);color:var(--ink);font-family:'Noto Sans JP',sans-serif;}
button{cursor:pointer;}
input,select,textarea{width:100%;border:1px solid var(--border);border-radius:12px;padding:12px;font-size:16px;background:#FFF;color:var(--ink);outline:none;transition:all 0.2s;}
input:focus,select:focus,textarea:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(255,107,107,0.15);}
.btn-primary{background:var(--accent);color:#FFF;font-weight:700;border-radius:14px;padding:14px 24px;box-shadow:0 4px 12px rgba(255,107,107,0.25);transition:all 0.2s;display:inline-flex;align-items:center;justify-content:center;gap:8px;}
.btn-primary:hover{background:var(--accent-dark);transform:translateY(-1px);box-shadow:0 6px 16px rgba(255,107,107,0.35);}
.btn-primary:active{transform:translateY(1px);}
.btn-secondary{background:#FFF;color:var(--ink);border:1px solid var(--border);font-weight:600;border-radius:14px;padding:14px 24px;transition:all 0.2s;display:inline-flex;align-items:center;justify-content:center;gap:8px;}
.btn-secondary:hover{background:#F8F6F0;border-color:var(--muted);}
.btn-secondary:active{background:#EEE;}
.bottom-nav-item{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:11px;font-weight:600;color:var(--muted);gap:4px;position:relative;}
.bottom-nav-item.active{color:var(--accent);}
.bottom-nav-item.active::after{content:'';position:absolute;top:0;width:24px;height:3px;background:var(--accent);border-radius:0 0 4px 4px;}
.card{background:var(--card);border:1px solid var(--border);border-radius:20px;box-shadow:0 4px 20px rgba(30,41,59,0.03);overflow:hidden;}
.shimmer{background:linear-gradient(90deg, #EFECE6 25%, #F5F2EC 50%, #EFECE6 75%);background-size:200% 100%;animation:loadingShimmer 1.5s infinite;}
@keyframes loadingShimmer{0%{background-position:200% 0;}100%{background-position:-200% 0;}}
.ios-safe-bottom{padding-bottom:calc(16px + env(safe-area-inset-bottom));}
.mc-toast{position:fixed;bottom:100px;left:50%;transform:translateX(-50%) translateY(20px);background:rgba(20,20,20,0.95);color:#FFF;border:3px solid #3c3c3c;padding:12px 20px;font-family:monospace;font-size:14px;z-index:9999;border-radius:4px;box-shadow:0 8px 24px rgba(0,0,0,0.5);opacity:0;pointer-events:none;transition:all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);text-align:center;max-width:90%;width:340px;}
.mc-toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
</style>
</head>
<body class="antialiased select-none overflow-x-hidden">

<div id="toast" class="fixed top-6 left-1/2 -translate-x-1/2 bg-slate-900/95 text-white text-sm font-medium px-4 py-3 rounded-xl shadow-xl z-50 opacity-0 transition-all duration-300 pointer-events-none flex items-center gap-2"></div>
<div id="mcToast" class="mc-toast"></div>

<div id="app" class="pb-32 min-h-screen">
  <header class="sticky top-0 bg-white/80 backdrop-blur-md border-b border-1 border-[#E7E1D7] z-40 px-4 py-3 flex items-center justify-between">
    <div class="flex items-center gap-2">
      <div class="w-9 h-9 bg-[#FF6B6B] rounded-xl flex items-center justify-center shadow-md shadow-red-200">
        <span class="text-white text-xl font-black">📦</span>
      </div>
      <div>
        <h1 class="text-lg font-extrabold tracking-tight text-slate-800">コドモカプセル</h1>
        <p class="text-[10px] text-slate-400 font-bold tracking-wider -mt-1 flex items-center gap-1">DIGITAL ART CAPSULE <span class="bg-red-50 text-red-500 px-1 rounded font-mono text-[9px]">v65</span></p>
      </div>
    </div>
    <div id="familyCodeBadge" class="hidden bg-[#F8F6F0] border border-[#E7E1D7] px-3 py-1.5 rounded-full text-xs font-bold text-slate-600 flex items-center gap-1.5">
      <span class="w-1.5 h-1.5 rounded-full bg-emerald-500 animate-pulse"></span>
      <span id="badgeText">接続中</span>
    </div>
  </header>

  <main class="max-w-md mx-auto px-4 pt-4">
    <div id="view-login" class="space-y-6 py-4">
      <div class="text-center space-y-2 py-4">
        <div class="text-5xl">🎨✨</div>
        <h2 class="text-2xl font-black text-slate-800">おえかきをカプセルに</h2>
        <p class="text-sm font-medium text-slate-500 leading-relaxed">こどもが描いた最高のあーとを、<br>家族だけのデジタルカプセルに保存しよう。</p>
      </div>
      <div class="card p-6 space-y-4">
        <div class="space-y-1.5">
          <label class="text-xs font-bold text-slate-500 tracking-wide uppercase">合言葉（ファミリーコード）</label>
          <input type="text" id="inputFamilyCode" placeholder="例: tanaka-happy-77" autocomplete="off" />
        </div>
        <button id="btnConnect" class="btn-primary w-full text-base">
          カプセルを開く 🚀
        </button>
      </div>
    </div>

    <div id="view-gallery" class="hidden space-y-6">
      <div class="flex items-center justify-between">
        <div>
          <h2 class="text-2xl font-black text-slate-800">みんなのあーと</h2>
          <p class="text-xs font-bold text-slate-400 mt-0.5">ARTWORKS IN CAPSULE</p>
        </div>
        <button id="btnGoUpload" class="btn-primary !py-2.5 !px-4 text-sm !rounded-xl">
          <span>たす ✨</span>
        </button>
      </div>
      <div id="galleryGrid" class="grid grid-cols-2 gap-4"></div>
      <div id="galleryEmpty" class="hidden text-center py-16 space-y-3">
        <div class="text-4xl">🫙</div>
        <p class="text-sm font-bold text-slate-400">カプセルはまだからっぽです。<br>さいしょの1枚を追加しよう！</p>
      </div>
    </div>

    <div id="view-upload" class="hidden space-y-6">
      <div>
        <h2 class="text-2xl font-black text-slate-800">あーとをたす</h2>
        <p class="text-xs font-bold text-slate-400 mt-0.5">ADD NEW ARTWORK</p>
      </div>
      <div class="card p-5 space-y-5">
        <div id="dropzone" class="border-2 border-dashed border-[#E7E1D7] rounded-2xl p-6 text-center bg-[#F8F6F0] hover:bg-[#F3F0E8] transition-colors cursor-pointer space-y-2">
          <div class="text-4xl" id="previewEmoji">📸</div>
          <div class="text-sm font-bold text-slate-600" id="dropzoneText">写真を撮るかファイルを選択</div>
          <p class="text-[11px] font-medium text-slate-400">またはここに画像をドロップ</p>
          <input type="file" id="inputFile" accept="image/*" class="hidden" />
        </div>
        <div id="imagePreviewContainer" class="hidden relative rounded-xl overflow-hidden border border-[#E7E1D7] bg-black aspect-video flex items-center justify-center">
          <img id="imagePreview" src="" class="max-h-full max-w-full object-contain" />
          <button id="btnRemoveImage" class="absolute top-2 right-2 w-8 h-8 rounded-full bg-black/60 backdrop-blur-md text-white font-bold text-sm flex items-center justify-center">✕</button>
        </div>
        <div class="space-y-4">
          <div class="space-y-1">
            <label class="text-xs font-bold text-slate-500">タイトル（なまえ）</label>
            <input type="text" id="inputTitle" placeholder="例: らいおん、パパのえ" autocomplete="off" />
          </div>
          <div class="space-y-1">
            <label class="text-xs font-bold text-slate-500">だれが描いた？</label>
            <input type="text" id="inputCreator" placeholder="例: つむぎ（5さい）" autocomplete="off" />
          </div>
        </div>
        <div class="flex gap-3 pt-2">
          <button id="btnCancelUpload" class="btn-secondary flex-1">やめる</button>
          <button id="btnSave" class="btn-primary flex-1">カプセルへ保存 📦</button>
        </div>
      </div>
    </div>

    <div id="view-detail" class="hidden space-y-6">
      <div class="flex items-center justify-between">
        <button id="btnBackToGallery" class="btn-secondary !py-2 !px-3 text-xs !rounded-xl">
          ◀ もどる
        </button>
        <button id="btnDelete" class="bg-red-50 text-[#D66A5E] hover:bg-red-100 font-bold text-xs px-3 py-2 rounded-xl transition-colors">
          さくじょ 🗑️
        </button>
      </div>
      <div class="card">
        <div class="bg-slate-900 w-full aspect-[4/3] flex items-center justify-center overflow-hidden">
          <img id="detailImage" src="" class="w-full h-full object-contain" />
        </div>
        <div class="p-6 space-y-4 bg-white">
          <div>
            <h3 id="detailTitle" class="text-2xl font-black text-slate-800 leading-tight"></h3>
            <div class="flex items-center gap-3 mt-2 text-sm font-bold text-slate-500">
              <span id="detailCreator" class="bg-[#F8F6F0] px-2.5 py-1 rounded-md text-slate-600"></span>
              <span id="detailDate"></span>
            </div>
          </div>
          <div class="border-t border-[#E7E1D7] pt-4">
            <button id="btnMinecraft" class="w-full bg-[#5c8e32] hover:bg-[#4d7729] text-white font-extrabold rounded-xl py-3.5 shadow-lg shadow-green-100 flex items-center justify-center gap-2 transition-all">
              🎮 マイクラへ書き出す (.mcaddon)
            </button>
          </div>
        </div>
      </div>
    </div>
  </main>

  <nav id="bottomNav" class="hidden fixed bottom-0 left-0 right-0 bg-white/95 backdrop-blur-md border-t border-[#E7E1D7] h-16 flex items-center justify-around z-40 shadow-xl ios-safe-bottom">
    <button id="nav-gallery" class="bottom-nav-item active">
      <span class="text-2xl">🎨</span>
      <span>あーと</span>
    </button>
    <button id="nav-upload" class="bottom-nav-item">
      <span class="text-2xl">✨</span>
      <span>たす</span>
    </button>
    <button id="nav-logout" class="bottom-nav-item">
      <span class="text-2xl">🚪</span>
      <span>でる</span>
    </button>
  </nav>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
import { getFirestore, collection, doc, setDoc, getDocs, query, orderBy, deleteDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
import { getStorage, ref, uploadBytes, getDownloadURL, deleteObject } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-storage.js";

const firebaseConfig = {
  apiKey: "AIzaSyDE_9b-K23pG66-rBfP_X66914W-g3718",
  authDomain: "kodomonote-prod.firebaseapp.com",
  projectId: "kodomonote-prod",
  storageBucket: "kodomonote-prod.firebasestorage.app",
  messagingSenderId: "392576918342",
  appId: "1:392576918342:web:7ef2bc69143c914e66"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);
const storage = getStorage(app);

let currentFamilyCode = localStorage.getItem("familyCode") || "";
let artworks = [];
let selectedArtwork = null;
let selectedFile = null;

// --- DOM CACHE ---
const views = {
  login: document.getElementById("view-login"),
  gallery: document.getElementById("view-gallery"),
  upload: document.getElementById("view-upload"),
  detail: document.getElementById("view-detail")
};
const navItems = {
  gallery: document.getElementById("nav-gallery"),
  upload: document.getElementById("nav-upload")
};

// --- TOAST NOTIFICATIONS ---
function showToast(msg, isError = false) {
  const t = document.getElementById("toast");
  t.textContent = msg;
  if(isError) {
    t.classList.add("bg-red-500");
    t.classList.remove("bg-slate-900/95");
  } else {
    t.classList.remove("bg-red-500");
    t.classList.add("bg-slate-900/95");
  }
  t.classList.remove("opacity-0", "translate-y-2");
  setTimeout(() => t.classList.add("opacity-0", "translate-y-2"), 3000);
}

function showMcToast(msg, duration = 3000) {
  const mt = document.getElementById("mcToast");
  mt.textContent = msg;
  mt.classList.add("show");
  setTimeout(() => mt.classList.remove("show"), duration);
}

// --- ROUTING / VIEW SWITCHER ---
function switchView(viewName) {
  Object.keys(views).forEach(k => views[k].classList.add("hidden"));
  views[viewName].classList.remove("hidden");
  
  if (viewName === "login") {
    document.getElementById("bottomNav").classList.add("hidden");
    document.getElementById("familyCodeBadge").classList.add("hidden");
  } else {
    document.getElementById("bottomNav").classList.remove("hidden");
    document.getElementById("familyCodeBadge").classList.remove("hidden");
    document.getElementById("badgeText").textContent = currentFamilyCode;
    
    Object.keys(navItems).forEach(k => navItems[k].classList.remove("active"));
    if (navItems[viewName]) navItems[viewName].classList.add("active");
  }
  window.scrollTo(0,0);
}

// --- APP INIT ---
async function init() {
  if (currentFamilyCode) {
    try {
      await signInAnonymously(auth);
      switchView("gallery");
      loadArtworks();
    } catch (e) {
      console.error(e);
      showToast("ログインに失敗しました", true);
      switchView("login");
    }
  } else {
    switchView("login");
  }
}

// --- DATA ACTIONS ---
async function loadArtworks() {
  const grid = document.getElementById("galleryGrid");
  const empty = document.getElementById("galleryEmpty");
  grid.innerHTML = Array(4).fill(0).map(() => `<div class="aspect-square card shimmer"></div>`).join('');
  empty.classList.add("hidden");

  try {
    const q = query(
      collection(db, "families", currentFamilyCode, "artworks"),
      orderBy("createdAt", "desc")
    );
    const snap = await getDocs(q);
    artworks = [];
    snap.forEach(doc => {
      artworks.push({ id: doc.id, ...doc.data() });
    });

    if (artworks.length === 0) {
      grid.innerHTML = "";
      empty.classList.remove("hidden");
      return;
    }

    grid.innerHTML = artworks.map(art => `
      <div class="card cursor-pointer group" onclick="window.appActions.showDetail('${art.id}')">
        <div class="aspect-square bg-slate-100 relative overflow-hidden flex items-center justify-center">
          <img src="${art.imageUrl}" class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-300" loading="lazy" />
        </div>
        <div class="p-3 space-y-0.5 bg-white">
          <h4 class="font-bold text-sm text-slate-800 truncate">${art.title || "むだい"}</h4>
          <p class="text-[11px] font-bold text-slate-400 truncate">${art.creator || "だれか"}</p>
        </div>
      </div>
    `).join('');
  } catch (e) {
    console.error(e);
    showToast("データの取得に失敗しました", true);
  }
}

// --- FILE HANDLERS ---
function handleFileSelect(file) {
  if (!file || !file.type.startsWith("image/")) {
    showToast("画像ファイルを選んでね", true);
    return;
  }
  selectedFile = file;
  const r = new FileReader();
  r.onload = (e) => {
    document.getElementById("imagePreview").src = e.target.result;
    document.getElementById("dropzone").classList.add("hidden");
    document.getElementById("imagePreviewContainer").classList.remove("hidden");
  };
  r.readAsDataURL(file);
}

function clearUploadForm() {
  selectedFile = null;
  document.getElementById("inputFile").value = "";
  document.getElementById("inputTitle").value = "";
  document.getElementById("inputCreator").value = "";
  document.getElementById("imagePreview").src = "";
  document.getElementById("dropzone").classList.remove("hidden");
  document.getElementById("imagePreviewContainer").classList.add("hidden");
}

// --- EVENT BINDINGS ---
document.getElementById("btnConnect").onclick = async () => {
  const code = document.getElementById("inputFamilyCode").value.trim();
  if (!code) return showToast("合言葉を入力してね", true);
  
  currentFamilyCode = code;
  localStorage.setItem("familyCode", code);
  document.getElementById("btnConnect").disabled = true;
  document.getElementById("btnConnect").textContent = "接続中...";
  
  try {
    await signInAnonymously(auth);
    showToast("カプセルに接続しました！");
    switchView("gallery");
    loadArtworks();
  } catch (e) {
    showToast("接続エラーが発生しました", true);
  } finally {
    document.getElementById("btnConnect").disabled = false;
    document.getElementById("btnConnect").textContent = "カプセルを開く 🚀";
  }
};

document.getElementById("btnGoUpload").onclick = () => {
  clearUploadForm();
  switchView("upload");
};

document.getElementById("btnCancelUpload").onclick = () => {
  switchView("gallery");
};

// Dropzone Events
const dz = document.getElementById("dropzone");
dz.onclick = () => document.getElementById("inputFile").click();
document.getElementById("inputFile").onchange = (e) => handleFileSelect(e.target.files[0]);
dz.ondragover = (e) => { e.preventDefault(); dz.classList.add("bg-slate-200"); };
dz.ondragleave = () => dz.classList.remove("bg-slate-200");
dz.ondrop = (e) => { e.preventDefault(); dz.classList.remove("bg-slate-200"); handleFileSelect(e.dataTransfer.files[0]); };
document.getElementById("btnRemoveImage").onclick = (e) => { e.stopPropagation(); clearUploadForm(); };

// Save Artwork
document.getElementById("btnSave").onclick = async () => {
  if (!selectedFile) return showToast("画像を選んでね", true);
  const title = document.getElementById("inputTitle").value.trim();
  const creator = document.getElementById("inputCreator").value.trim();
  
  const btn = document.getElementById("btnSave");
  btn.disabled = true;
  btn.textContent = "保存中... ⏳";

  try {
    const artId = "art_" + Date.now();
    const storageRef = ref(storage, `families/${currentFamilyCode}/artworks/${artId}/${selectedFile.name}`);
    const snap = await uploadBytes(storageRef, selectedFile);
    const url = await getDownloadURL(snap.ref);

    await setDoc(doc(db, "families", currentFamilyCode, "artworks", artId), {
      title: title || "むだい",
      creator: creator || "おてつだい",
      imageUrl: url,
      storagePath: storageRef.fullPath,
      createdAt: new Date().toISOString()
    });

    showToast("カプセルに保存したよ！ ✨");
    switchView("gallery");
    loadArtworks();
  } catch (e) {
    console.error(e);
    showToast("保存に失敗しました", true);
  } finally {
    btn.disabled = false;
    btn.textContent = "カプセルへ保存 📦";
  }
};

// Navigation
document.getElementById("nav-gallery").onclick = () => { switchView("gallery"); loadArtworks(); };
document.getElementById("nav-upload").onclick = () => { clearUploadForm(); switchView("upload"); };
document.getElementById("nav-logout").onclick = () => {
  if(confirm("カプセルから出ますか？")) {
    localStorage.removeItem("familyCode");
    currentFamilyCode = "";
    switchView("login");
  }
};

document.getElementById("btnBackToGallery").onclick = () => switchView("gallery");

document.getElementById("btnDelete").onclick = async () => {
  if (!selectedArtwork) return;
  if (!confirm(`「${selectedArtwork.title}」を削除してもいいですか？`)) return;

  try {
    if (selectedArtwork.storagePath) {
      await deleteObject(ref(storage, selectedArtwork.storagePath)).catch(e => console.warn("Storage deletion skip:", e));
    }
    await deleteDoc(doc(db, "families", currentFamilyCode, "artworks", selectedArtwork.id));
    showToast("さくじょしました 🗑️");
    switchView("gallery");
    loadArtworks();
  } catch(e) {
    showToast("削除に失敗しました", true);
  }
};

// --- マインクラフトアドオン書き出し機能 ---
async function exportToMinecraft(imageUrl, title) {
  const safeTitle = (title || "artwork").replace(/[^a-zA-Z0-9_\u30A0-\u30FF\u3040-\u309F\u4E00-\u9FA0]/g, "_");
  showMcToast("⛏️ マイクラデータを準備中...", 3000);

  try {
    // 【超重要】CORSエラーを完全に回避するため、fetch ではなく Image オブジェクト + crossOrigin で非同期読み込みする
    const loadImageWithCorsBypass = (url) => {
      return new Promise((resolve, reject) => {
        const img = new Image();
        img.crossOrigin = "anonymous"; // これが重要！
        img.onload = () => resolve(img);
        img.onerror = () => reject(new Error("画像の読み込みに失敗しました（CORS制限、またはURLが無効です）"));
        // キャッシュを強制バイパスするためのタイムスタンプを付与
        img.src = url + (url.includes('?') ? '&' : '?') + 'ts=' + Date.now();
      });
    };

    // 画像を安全に読み込む
    const img = await loadImageWithCorsBypass(imageUrl);

    // Canvas を使って 16x16 のドット絵テクスチャに縮小変換
    const canvas = document.createElement("canvas");
    canvas.width = 16;
    canvas.height = 16;
    const ctx = canvas.getContext("2d");
    
    ctx.imageSmoothingEnabled = false; // ドットをクッキリさせる設定
    ctx.drawImage(img, 0, 0, 16, 16);

    // Canvas から PNG のバイナリデータ（Blob）を取得
    const pngBlob = await new Promise((resolve) => canvas.toBlob(resolve, "image/png"));
    if (!pngBlob) throw new Error("PNGの変換に失敗しました");
    
    // JSZip に渡すために ArrayBuffer に変換
    const pngBuffer = await pngBlob.arrayBuffer();
    const pngBytes = new Uint8Array(pngBuffer);

    showMcToast("📦 アドオンパックをパック中...", 2000);

    // UUIDの自動生成（マイクラが識別するために必要な一意のID）
    const generateUuid = () => {
      return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, function(c) {
        var r = Math.random() * 16 | 0, v = c == 'x' ? r : (r & 0x3 | 0x8);
        return v.toString(16);
      });
    };

    const manifestUuid = generateUuid();
    const moduleUuid   = generateUuid();

    // 1. manifest.json
    const manifest = {
      format_version: 2,
      header: {
        description: `Custom Artwork Block: ${title}`,
        name: `${title} Pack`,
        uuid: manifestUuid,
        version: [1, 0, 0],
        min_engine_version: [1, 16, 100]
      },
      modules: [
        {
          description: "Resource Pack Module",
          type: "resources",
          uuid: moduleUuid,
          version: [1, 0, 0]
        }
      ]
    };

    // 2. blocks.json (登録用)
    const blocksJson = {
      "kc:artwork_block": {
        "textures": "kc_artwork"
      }
    };

    // 3. blocks/artwork_block.json (挙動・定義用)
    const blockDef = {
      format_version: "1.16.100",
      "minecraft:block": {
        description: {
          identifier: "kc:artwork_block",
          is_experimental: false
        },
        components: {
          "minecraft:creative_category": {
            "category": "commands"
          },
          "minecraft:block_light_emission": 0.0,
          "minecraft:destroy_time": 1.0,
          "minecraft:explosion_resistance": 1.0,
          "minecraft:material_instances": {
            "*": {
              "texture": "kc_artwork",
              "render_method": "opaque"
            }
          }
        }
      }
    };

    // 4. textures/terrain_texture.json (テクスチャ定義)
    const terrainTexture = {
      resource_pack_name: "kodomo_capsule",
      texture_name: "atlas.terrain",
      texture_data: {
        "kc_artwork": {
          "textures": "textures/artwork"
        }
      }
    };

    // JSZipで固める
    const zip = new JSZip();
    zip.file("manifest.json",               JSON.stringify(manifest, null, 2));
    zip.file("blocks.json",                 JSON.stringify(blocksJson, null, 2));
    zip.file("blocks/artwork_block.json",   JSON.stringify(blockDef, null, 2));
    zip.file("textures/terrain_texture.json", JSON.stringify(terrainTexture, null, 2));
    zip.file("textures/artwork.png",        pngBytes, { binary: true });

    // ZIP → Blob → ダウンロード
    const zipBlob = await zip.generateAsync({ type: "blob", compression: "DEFLATE" });
    const fileName = `${safeTitle}_artwork.mcaddon`;

    // iOS/iPadOS 対応: createObjectURL + a タグクリック
    const url = URL.createObjectURL(zipBlob);
    const a = document.createElement("a");
    a.href = url;
    a.download = fileName;
    document.body.appendChild(a);
    a.click();
    setTimeout(() => {
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
    }, 2000);

    showMcToast(`✅ ${fileName} をダウンロードしました！`, 4000);

  } catch (err) {
    console.error("Minecraft書き出しエラー:", err);
    const firstLine = err.message.split("\n")[0];
    showMcToast(`❌ ${firstLine}`, 6000);
  }
}

// 外部から叩けるグローバル関数
window.appActions = {
  showDetail: (id) => {
    selectedArtwork = artworks.find(a => a.id === id);
    if (!selectedArtwork) return;

    document.getElementById("detailImage").src = selectedArtwork.imageUrl;
    document.getElementById("detailTitle").textContent = selectedArtwork.title;
    document.getElementById("detailCreator").textContent = selectedArtwork.creator;
    
    const d = new Date(selectedArtwork.createdAt);
    document.getElementById("detailDate").textContent = isNaN(d) ? "" : `${d.getFullYear()}/${d.getMonth()+1}/${d.getDate()}`;

    // 書き出しボタンのイベントを再割り当て
    document.getElementById("btnMinecraft").onclick = () => {
      exportToMinecraft(selectedArtwork.imageUrl, selectedArtwork.title);
    };

    switchView("detail");
  }
};

// 起動
init();
</script>
