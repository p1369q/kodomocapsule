<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>コドモノート [v41]</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght=400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{--bg:#F7F4EE;--card:#FFFFFF;--ink:#1E293B;--muted:#64748B;--accent:#7C9A92;--accent-dark:#56736C;--gold:#D6B25E;--border:#E7E1D7;--danger:#D66A5E;}\n*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}\nhtml,body{margin:0;padding:0;background:var(--bg);color:var(--ink);font-family:'Noto Sans JP',sans-serif;}\nbutton{cursor:pointer;}\ninput,select,textarea{width:100%;border:1px solid var(--border);border-radius:16px;padding:14px 16px;background:white;outline:none;}\n.hidden{display:none !important;}\n.page{display:none;padding-bottom:100px;}\n.page.active{display:block;}\n.card{background:var(--card);border:1px solid var(--border);border-radius:24px;padding:20px;box-shadow:0 4px 12px rgba(124,154,146,0.04);}\n.btn{border-radius:16px;padding:14px 20px;font-weight:600;text-align:center;transition:all 0.2s;display:inline-flex;align-items:center;justify-content:center;gap:8px;}\n.btn-primary{background:var(--accent);color:white;}\n.btn-primary:hover{background:var(--accent-dark);}\n.btn-secondary{background:white;border:1px solid var(--border);color:var(--ink);}\n.btn-danger{background:#FEF2F2;color:var(--danger);border:1px solid #FEE2E2;}\n.drawer{position:fixed;top:0;right:-100%;width:100%;max-width:500px;height:100%;background:var(--bg);box-shadow:-4px 0 24px rgba(0,0,0,0.1);transition:right 0.3s ease;z-index:100;display:flex;flex-direction:column;}\n.drawer.open{right:0;}\n.drawer-header{padding:20px;background:white;border-bottom:1px solid var(--border);display:flex;justify-content:between;align-items:center;}\n.drawer-body{flex:1;overflow-y:auto;padding:20px;display:flex;flex-direction:column;gap:20px;}\n.drawer-footer{padding:20px;background:white;border-top:1px solid var(--border);display:flex;gap:12px;}\n.bottom-nav{position:fixed;bottom:0;left:0;right:0;height:72px;background:white;border-top:1px solid var(--border);display:flex;justify-content:around;align-items:center;z-index:90;padding-bottom:calc(dashed + 4px);}\n.nav-tab{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:11px;font-weight:600;color:var(--muted);gap:4px;height:100%;}\n.nav-tab.active{color:var(--accent);}\n.nav-tab svg{width:22px;height:22px;fill:currentColor;}\n.media-scroll{display:flex;gap:12px;overflow-x:auto;padding-bottom:8px;scroll-snap-type:x mandatory;}\n.media-scroll::-webkit-scrollbar{height:4px;}\n.media-scroll::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}\n.media-item{flex:none;width:120px;height:120px;border-radius:16px;overflow:hidden;position:relative;background:#E2E8F0;scroll-snap-align:start;}\n.media-item img,.media-item video{width:100%;height:100%;object-fit:cover;}\n.media-badge{position:absolute;bottom:4px;right:4px;background:rgba(0,0,0,0.6);color:white;font-size:10px;padding:2px 6px;border-radius:8px;font-weight:bold;}\n.carousel-container{position:relative;width:100%;aspect-ratio:4/3;background:#000;border-radius:20px;overflow:hidden;}\n.carousel-track{display:flex;width:100%;height:100%;transition:transform 0.3s ease-in-out;}\n.carousel-slide{flex:none;width:100%;height:100%;display:flex;align-items:center;justify-content:center;position:relative;}\n.carousel-slide img,.carousel-slide video{width:100%;height:100%;object-fit:contain;}\n.carousel-btn{position:absolute;top:50%;transform:translateY(-50%);background:rgba(255,255,255,0.8);backdrop-filter:blur(4px);border:1px solid var(--border);width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;z-index:10;box-shadow:0 2px 8px rgba(0,0,0,0.1);}\n.carousel-indicator{position:absolute;bottom:16px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,0.5);color:white;font-size:12px;padding:4px 10px;border-radius:12px;font-weight:500;z-index:10;}\n.floating-btn{position:fixed;bottom:92px;right:16px;width:56px;height:56px;border-radius:28px;background:var(--accent);color:white;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 16px rgba(124,154,146,0.3);z-index:80;font-size:24px;}\n.tag{display:inline-block;padding:4px 10px;border-radius:8px;font-size:12px;font-weight:600;}\n.tag-artwork{background:#EFF6FF;color:#1D4ED8;}\n.tag-print{background:#ECFDF5;color:#047857;}\n.tag-exam{background:#FFF7ED;color:#C2410C;}\n.toast{position:fixed;top:24px;left:50%;transform:translateX(-50%) translateY(-100px);background:var(--ink);color:white;padding:12px 24px;border-radius:16px;box-shadow:0 10px 25px rgba(0,0,0,0.15);z-index:200;transition:transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);font-weight:500;font-size:14px;}\n.toast.show{transform:translateX(-50%) translateY(0);}\n</style>
</head>
<body class="p-4 max-w-md mx-auto">

<div id="toast" class="toast"></div>

<div id="authPage" class="page active pt-8">
  <div class="text-center mb-8">
    <h1 class="text-3xl font-extrabold tracking-tight mb-2" style="color:var(--accent)">コドモノート</h1>
    <p class="text-sm" style="color:var(--muted)">子どもの作品・プリント・テスト管理アプリ</p>
  </div>
  <div class="card flex flex-col gap-4">
    <h2 class="text-xl font-bold mb-2 text-center" id="authTitle">ログイン</h2>
    <div>
      <label class="block text-xs font-bold mb-1 pl-1" style="color:var(--muted)">メールアドレス</label>
      <input type="email" id="authEmail" placeholder="example@gmail.com" />
    </div>
    <div>
      <label class="block text-xs font-bold mb-1 pl-1" style="color:var(--muted)">パスワード</label>
      <input type="password" id="authPassword" placeholder="6文字以上" />
    </div>
    <button class="btn btn-primary w-full mt-2" id="btnAuthAction" onclick="handleAuth()">ログイン</button>
    <div class="text-center mt-2">
      <button class="text-xs font-semibold underline" style="color:var(--muted)" id="btnAuthToggle" onclick="toggleAuthMode()">新規アカウント作成はこちら</button>
    </div>
  </div>
</div>

<div id="galleryPage" class="page">
  <div class="flex justify-between items-center mb-6">
    <h1 class="text-2xl font-extrabold tracking-tight">ギャラリー</h1>
    <button class="w-10 h-10 rounded-full flex items-center justify-center bg-white border border-neutral-200 shadow-sm" onclick="openDrawer('settings')">
      <svg class="w-5 h-5" style="color:var(--muted)" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/><path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
    </button>
  </div>
  <div id="galleryContainer" class="grid grid-cols-2 gap-4"></div>
</div>

<div id="recordsPage" class="page">
  <div class="flex justify-between items-center mb-6">
    <h1 class="text-2xl font-extrabold tracking-tight">タイムライン</h1>
  </div>
  <div id="timelineContainer" class="flex flex-col gap-4"></div>
</div>

<div id="trashPage" class="page">
  <div class="flex items-center gap-3 mb-6">
    <button onclick="switchPage('gallery')" class="w-8 h-8 rounded-full bg-white border border-neutral-200 flex items-center justify-center">←</button>
    <h1 class="text-2xl font-extrabold tracking-tight">ゴミ箱</h1>
  </div>
  <div id="trashContainer" class="grid grid-cols-2 gap-4"></div>
</div>

<div id="workDrawer" class="drawer">
  <div class="drawer-header">
    <h2 class="text-lg font-bold" id="workFormTitle">データ登録</h2>
    <button class="text-2xl font-bold" onclick="closeDrawer('work')">×</button>
  </div>
  <div class="drawer-body">
    <form id="workForm" onsubmit="return false;" class="flex flex-col gap-4">
      <input type="hidden" id="editingWorkId" />
      <div>
        <label class="block text-xs font-bold mb-1 pl-1" style="color:var(--muted)">子どもを選択</label>
        <select id="inputChildId" required></select>
      </div>
      <div>
        <label class="block text-xs font-bold mb-1 pl-1" style="color:var(--muted)">タイトル</label>
        <input type="text" id="inputTitle" placeholder="無題の作品" required />
      </div>
      <div>
        <label class="block text-xs font-bold mb-1 pl-1" style="color:var(--muted)">日付</label>
        <input type="date" id="inputDate" required />
      </div>
      <div>
        <label class="block text-xs font-bold mb-1 pl-1" style="color:var(--muted)">カテゴリ</label>
        <select id="inputCategory">
          <option value="artwork">🎨 作品</option>
          <option value="print">📄 プリント</option>
          <option value="exam">💯 テスト</option>
        </select>
      </div>
      <div>
        <label class="block text-xs font-bold mb-1 pl-1" style="color:var(--muted)">メモ</label>
        <textarea id="inputMemo" rows="3" placeholder="エピソードやコメントなど" style="width:100%;border:1px solid var(--border);border-radius:16px;padding:14px 16px;background:white;outline:none;"></textarea>
      </div>
      <div>
        <label class="block text-xs font-bold mb-1 pl-1" style="color:var(--muted)">メディアを追加 (複数可・動画もOK)</label>
        <input type="file" id="inputFile" accept="image/*,video/*" multiple class="border-dashed border-2 bg-neutral-50" />
      </div>
      <div id="mediaResultContainer" class="media-scroll mt-2"></div>
    </form>
  </div>
  <div class="drawer-footer">
    <button class="btn btn-secondary flex-1" onclick="closeDrawer('work')">キャンセル</button>
    <button class="btn btn-primary flex-1" onclick="saveWork()">保存する</button>
  </div>
</div>

<div id="settingsDrawer" class="drawer">
  <div class="drawer-header">
    <h2 class="text-lg font-bold">アカウント・設定</h2>
    <button class="text-2xl font-bold" onclick="closeDrawer('settings')">×</button>
  </div>
  <div class="drawer-body">
    <div class="card flex flex-col gap-2">
      <div class="flex items-center justify-between">
        <span class="text-xs font-bold" style="color:var(--muted)">アカウントプラン</span>
        <span id="planBadge" class="tag bg-neutral-100 text-neutral-600">無料プラン</span>
      </div>
      <div id="planStatusText" class="text-sm font-bold mt-1">無料プラン（子ども1人 / 作品10件まで）</div>
      <button id="btnUpgrade" class="btn btn-primary w-full mt-2" style="background:var(--gold)" onclick="redirectToStripe()">
        💎 プレミアムにする
      </button>
    </div>
    <div class="flex justify-between items-center mt-4">
      <h3 class="text-md font-bold">子どもプロフィール</h3>
      <button class="text-sm font-bold" style="color:var(--accent)" onclick="openChildAdd()">+ 追加する</button>
    </div>
    <div id="childListContainer" class="flex flex-col gap-2"></div>
    <div id="childFormContainer" class="card hidden flex flex-col gap-3 mt-2">
      <h4 class="text-sm font-bold" id="childFormTitle">子どもを追加</h4>
      <input type="hidden" id="editingChildId" />
      <input type="text" id="childName" placeholder="お名前" />
      <input type="date" id="childBirthday" />
      <div class="flex gap-2">
        <button class="btn btn-secondary flex-1 py-2 text-sm" onclick="cancelChildEdit()">戻る</button>
        <button class="btn btn-primary flex-1 py-2 text-sm" onclick="saveChild()">保存</button>
      </div>
    </div>
    <button class="btn btn-secondary w-full text-sm mt-4" onclick="switchPage('trash'); closeDrawer('settings');">🗑️ ゴミ箱を見る</button>
    <button class="btn btn-danger w-full text-sm mt-2" onclick="handleLogout()">ログアウト</button>
  </div>
</div>

<button id="btnFloatingAdd" class="floating-btn hidden" onclick="openDrawer('work')">+</button>

<nav id="bottomNav" class="bottom-nav hidden">
  <button id="nav-gallery" class="nav-tab active" onclick="switchPage('gallery')">
    <svg viewBox="0 0 24 24"><path d="M4 5a2 2 0 012-2h12a2 2 0 012 2v10a2 2 0 01-2 2H6a2 2 0 01-2-2V5zm2 0v10h12V5H6z"/><path d="M7 11l2.5-3 2.5 3 1.5-1.5L17 13H7v-2z"/></svg>
    ギャラリー
  </button>
  <button id="nav-records" class="nav-tab" onclick="switchPage('records')">
    <svg viewBox="0 0 24 24"><path d="M19 3h-1V1h-2v2H8V1H6v2H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm0 16H5V8h14v11zM7 10h5v5H7z"/></svg>
    タイムライン
  </button>
</nav>

<script type="importmap">
  { "imports": { "firebase/app": "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js", "firebase/auth": "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js", "firebase/firestore": "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js", "firebase/storage": "https://www.gstatic.com/firebasejs/10.7.1/firebase-storage.js" } }
</script>

<script type="module">
import { initializeApp } from 'firebase/app';
import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut } from 'firebase/auth';
import { getFirestore, doc, getDoc, setDoc, collection, addDoc, updateDoc, deleteDoc, query, where, orderBy, onSnapshot } from 'firebase/firestore';
import { getStorage, ref, uploadBytes, getDownloadURL } from 'firebase/storage';

const firebaseConfig = { apiKey: "${{ secrets.FIREBASE_API_KEY }}", authDomain: "kodomonote-prod.firebaseapp.com", projectId: "kodomonote-prod", storageBucket: "kodomonote-prod.appspot.com", messagingSenderId: "486206364077", appId: "1:486206364077:web:7ef2db93e7845f949c869e" };
const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);
const storage = getStorage(app);

let currentUser = null;
let currentProfile = null;
let childrenData = [];
let worksData = [];
let base64MediaArray = [];
let carouselIndexMap = {};

function showToast(m){ const t = document.getElementById("toast"); t.innerText = m; t.classList.add("show"); setTimeout(()=>t.classList.remove("show"), 3000); }

window.toggleAuthMode = function(){
  const t = document.getElementById("authTitle");
  const b = document.getElementById("btnAuthAction");
  const sw = document.getElementById("btnAuthToggle");
  if(t.innerText === "ログイン"){ t.innerText = "アカウント作成"; b.innerText = "新規登録"; sw.innerText = "ログイン画面に戻る"; }
  else { t.innerText = "ログイン"; b.innerText = "ログイン"; sw.innerText = "新規アカウント作成はこちら"; }
};

window.handleAuth = async function(){
  const e = document.getElementById("authEmail").value.trim();
  const p = document.getElementById("authPassword").value;
  const isCreate = document.getElementById("authTitle").innerText === "アカウント作成";
  if(!e || !p) return showToast("メールアドレスとパスワードを入力してください");
  try {
    if(isCreate){
      const res = await createUserWithEmailAndPassword(auth, e, p);
      await setDoc(doc(db, "users", res.user.uid), { isPremium: false, createdAt: new Date() });
      showToast("アカウントを作成しました！");
    } else {
      await signInWithEmailAndPassword(auth, e, p);
      showToast("ログインしました");
    }
  } catch(err){ showToast("認証エラー: " + err.message); }
};

window.handleLogout = function(){ signOut(auth).then(()=>showToast("ログアウトしました")); };

onAuthStateChanged(auth, (user) => {
  if (user) {
    currentUser = user;
    document.getElementById("authPage").classList.add("hidden");
    document.getElementById("bottomNav").classList.remove("hidden");
    document.getElementById("btnFloatingAdd").classList.remove("hidden");
    switchPage("gallery");
    
    onSnapshot(doc(db, "users", user.uid), (docSnap) => {
      if (docSnap.exists()) {
        currentProfile = docSnap.data();
        const isPrem = currentProfile.isPremium === true;
        const b = document.getElementById("planBadge");
        const st = document.getElementById("planStatusText");
        const btnU = document.getElementById("btnUpgrade");
        if(isPrem){
          b.innerText = "プレミアム"; b.className = "tag bg-amber-100 text-amber-700";
          st.innerText = "プレミアムプラン（制限なしで使い放題！）"; btnU.classList.add("hidden");
        } else {
          b.innerText = "無料プラン"; b.className = "tag bg-neutral-100 text-neutral-600";
          st.innerText = "無料プラン（子ども1人 / 作品10件まで）"; btnU.classList.remove("hidden");
        }
      }
    });

    onSnapshot(query(collection(db, "users", user.uid, "children")), (snap) => {
      childrenData = snap.docs.map(d => ({id: d.id, ...d.data()}));
      renderChildList();
      updateChildSelect();
    });

    onSnapshot(query(collection(db, "users", user.uid, "works"), orderBy("date", "desc")), (snap) => {
      worksData = snap.docs.map(d => ({id: d.id, ...d.data()}));
      renderGallery();
      renderTimeline();
      renderTrash();
    });

  } else {
    currentUser = null; currentProfile = null; childrenData = []; worksData = [];
    document.getElementById("authPage").classList.remove("hidden");
    document.getElementById("bottomNav").classList.add("hidden");
    document.getElementById("btnFloatingAdd").classList.add("hidden");
    document.querySelectorAll('.page').forEach(el => el.classList.remove('active'));
    closeDrawer();
  }
});

// 💳 Stripe決済画面への遷移処理（★178行目の通信先URLのみを本物のCloud Runに書き換えました★）
window.redirectToStripe = async function() {
  const btn = document.getElementById("btnUpgrade");
  btn.disabled = true;
  btn.innerText = "決済画面へ移行中...";
  try {
    const idToken = await auth.currentUser.getIdToken(true);
    const response = await fetch('https://create-checkout-session-486206364077.us-central1.run.app', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${idToken}` }
    });
    if (!response.ok) {
      const errText = await response.text();
      throw new Error(`サーバーエラー (${response.status}): ${errText}`);
    }
    const data = await response.json();
    if (data.url) { window.location.href = data.url; } 
    else { throw new Error('決済URLの取得に失敗しました。'); }
  } catch (error) {
    console.error(error);
    alert(`【Stripe接続エラー】\n${error.message}\n\nバックエンドサーバーへの接続に失敗しました。`);
    btn.disabled = false;
    btn.innerText = "💎 プレミアムにする";
  }
};

window.openChildAdd = function(){
  document.getElementById("childFormTitle").innerText = "子どもを追加";
  document.getElementById("editingChildId").value = "";
  document.getElementById("childName").value = "";
  document.getElementById("childBirthday").value = "";
  document.getElementById("childFormContainer").classList.remove("hidden");
};

window.cancelChildEdit = function(){ document.getElementById("childFormContainer").classList.add("hidden"); };

window.saveChild = async function(){
  const name = document.getElementById("childName").value.trim();
  const bday = document.getElementById("childBirthday").value;
  const editingId = document.getElementById("editingChildId").value;
  if(!name) return showToast("お名前を入力してください");
  
  const isPremium = currentProfile?.isPremium === true;
  if(!isPremium && childrenData.length >= 1 && !editingId){
    return alert("無料プランでは登録できるお子様は1名までです。プレミアムプランへのアップグレードをご検討ください。");
  }

  try {
    const refCol = collection(db, "users", currentUser.uid, "children");
    if(editingId){ await setDoc(doc(refCol, editingId), { name, birthday: bday }, {merge:true}); showToast("修正しました"); } 
    else { await addDoc(refCol, { name, birthday: bday, createdAt: new Date() }); showToast("追加しました"); }
    cancelChildEdit();
  } catch(e){ showToast("保存エラー: " + e.message); }
};

window.editChild = function(id, name, bday){
  document.getElementById("childFormTitle").innerText = "プロフィール編集";
  document.getElementById("editingChildId").value = id;
  document.getElementById("childName").value = name;
  document.getElementById("childBirthday").value = bday || "";
  document.getElementById("childFormContainer").classList.remove("hidden");
};

window.deleteChild = async function(id){
  if(!confirm("このお子様を削除しますか？(登録された作品データは残ります)")) return;
  try { await deleteDoc(doc(db, "users", currentUser.uid, "children", id)); showToast("削除しました"); } catch(e){ showToast("削除エラー"); }
};

function renderChildList(){
  const c = document.getElementById("childListContainer"); c.innerHTML = "";
  childrenData.forEach(ch => {
    const d = document.createElement("div"); d.className = "flex items-center justify-between bg-neutral-50 p-3 rounded-xl border border-neutral-200 text-sm";
    d.innerHTML = `<div><strong>${ch.name}</strong> <span class="text-xs text-neutral-400">${ch.birthday||''}</span></div><div class="flex gap-2"><button class="text-xs text-blue-600 font-semibold" onclick="editChild('${ch.id}','${ch.name}','${ch.birthday||''}')">編集</button><button class="text-xs text-red-500 font-semibold" onclick="deleteChild('${ch.id}')">削除</button></div>`;
    c.appendChild(d);
  });
}

function updateChildSelect(){
  const s = document.getElementById("inputChildId"); s.innerHTML = "";
  if(childrenData.length === 0){ const o = document.createElement("option"); o.text="子どもが登録されていません"; o.value=""; s.appendChild(o); return; }
  childrenData.forEach(ch => { const o = document.createElement("option"); o.value = ch.id; o.text = ch.name; s.appendChild(o); });
}

document.getElementById("inputFile").addEventListener("change", function(e){
  const files = e.target.files;
  if(!files) return;
  Array.from(files).forEach(file => {
    const reader = new FileReader();
    reader.onload = function(evt) {
      const type = file.type.startsWith('video/') ? 'video' : 'image';
      base64MediaArray.push({ type: type, base64: evt.target.result, file: file });
      renderMediaPreviews();
    };
    reader.readAsDataURL(file);
  });
});

function renderMediaPreviews(){
  const c = document.getElementById("mediaResultContainer"); c.innerHTML = "";
  base64MediaArray.forEach((m, idx) => {
    const d = document.createElement("div"); d.className = "media-item shadow-inner";
    if(m.type === 'video'){ d.innerHTML = `<video src="${m.base64}"></video><span class="media-badge">動画</span>`; } 
    else { d.innerHTML = `<img src="${m.base64}"/>`; }
    const b = document.createElement("button"); b.className = "absolute top-1 right-1 w-6 h-6 rounded-full bg-black/70 text-white text-xs font-bold flex items-center justify-center"; b.innerText = "×";
    b.onclick = (e) => { e.stopPropagation(); base64MediaArray.splice(idx, 1); renderMediaPreviews(); };
    d.appendChild(b); c.appendChild(d);
  });
}

window.saveWork = async function(){
  const childId = document.getElementById("inputChildId").value;
  const title = document.getElementById("inputTitle").value.trim() || "無題の作品";
  const date = document.getElementById("inputDate").value;
  const category = document.getElementById("inputCategory").value;
  const memo = document.getElementById("inputMemo").value;
  const editingId = document.getElementById("editingWorkId").value;
  
  if(!childId) return alert("子どもを選択、または先に設定から登録してください。");
  if(!date) return alert("日付を入力してください");

  const isPremium = currentProfile?.isPremium === true;
  const activeWorksCount = worksData.filter(w => !w.isDeleted).length;
  if(!isPremium && activeWorksCount >= 10 && !editingId){
    return alert("無料プランでは保存できるデータは10件までです。プレミアムプランへのアップグレードをご検討ください。");
  }

  showToast("保存中...");
  try {
    let mediaUrls = [];
    if(editingId){ const old = worksData.find(w=>w.id===editingId); if(old && old.media) mediaUrls = [...old.media]; }

    for(let m of base64MediaArray){
      if(m.file){
        const path = `users/${currentUser.uid}/works/${Date.now()}_${m.file.name}`;
        const sRef = ref(storage, path);
        await uploadBytes(sRef, m.file);
        const url = await getDownloadURL(sRef);
        mediaUrls.push({ type: m.type, url: url });
      }
    }

    const refCol = collection(db, "users", currentUser.uid, "works");
    const payload = { childId, title, date, category, memo, media: mediaUrls, updatedAt: new Date() };
    
    if(editingId){ await setDoc(doc(refCol, editingId), payload, {merge:true}); showToast("更新しました"); } 
    else { payload.createdAt = new Date(); payload.isDeleted = false; await addDoc(refCol, payload); showToast("登録しました"); }
    
    closeDrawer('work');
    base64MediaArray = [];
    document.getElementById("workForm").reset();
    document.getElementById("mediaResultContainer").innerHTML = "";
  } catch(e){ alert("保存に失敗しました: " + e.message); }
};

window.openWorkEdit = function(id){
  const w = worksData.find(item => item.id === id);
  if(!w) return;
  document.getElementById("workFormTitle").innerText = "データ編集";
  document.getElementById("editingWorkId").value = w.id;
  document.getElementById("inputChildId").value = w.childId;
  document.getElementById("inputTitle").value = w.title;
  document.getElementById("inputDate").value = w.date;
  document.getElementById("inputCategory").value = w.category;
  document.getElementById("inputMemo").value = w.memo || "";
  base64MediaArray = [];
  
  const c = document.getElementById("mediaResultContainer"); c.innerHTML = "";
  if(w.media && w.media.length > 0){
    w.media.forEach((m, idx) => {
      const d = document.createElement("div"); d.className = "media-item";
      if(m.type === 'video'){ d.innerHTML = `<video src="${m.url}" controls></video><span class="media-badge">動画</span>`; } 
      else { d.innerHTML = `<img src="${m.url}"/>`; }
      const b = document.createElement("button"); b.className = "absolute top-1 right-1 w-6 h-6 rounded-full bg-black/70 text-white text-xs font-bold flex items-center justify-center"; b.innerText = "×";
      b.onclick = (e) => { e.stopPropagation(); w.media.splice(idx, 1); openWorkEdit(id); };
      d.appendChild(b); c.appendChild(d);
    });
  }
  openDrawer('work');
};

window.trashWork = async function(id){
  if(!confirm("このデータをゴミ箱に移動しますか？")) return;
  try { await updateDoc(doc(db, "users", currentUser.uid, "works", id), { isDeleted: true, deletedAt: new Date() }); showToast("ゴミ箱へ移動しました"); } catch(e){ showToast("エラーが発生しました"); }
};

window.restoreWork = async function(id){
  try { await updateDoc(doc(db, "users", currentUser.uid, "works", id), { isDeleted: false, deletedAt: null }); showToast("元に戻しました"); } catch(e){ showToast("エラーが発生しました"); }
};

window.killWork = async function(id){
  if(!confirm("ゴミ箱から完全に削除しますか？この操作は取り消せません。")) return;
  try { await deleteDoc(doc(db, "users", currentUser.uid, "works", id)); showToast("完全に削除しました"); } catch(e){ showToast("エラーが発生しました"); }
};

function buildCarouselHtml(media, workId){
  if(!media || media.length === 0) return `<div class="carousel-container flex items-center justify-center text-neutral-300 text-sm">🟢 メディアなし</div>`;
  carouselIndexMap[workId] = 0;
  let slides = "";
  media.forEach(m => {
    slides += `<div class="carousel-slide">`;
    if(m.type === 'video') slides += `<video src="${m.url}" controls></video>`;
    else slides += `<img src="${m.url}" loading="lazy"/>`;
    slides += `</div>`;
  });
  let btns = "";
  if(media.length > 1){
    btns = `<button class="carousel-btn left-3" onclick="moveCarousel('${workId}', -1, ${media.length})">←</button><button class="carousel-btn right-3" onclick="moveCarousel('${workId}', 1, ${media.length})">→</button><div id="indicator-${workId}" class="carousel-indicator">1 / ${media.length}</div>`;
  }
  return `<div class="carousel-container"><div id="track-${workId}" class="carousel-track">${slides}</div>${btns}</div>`;
}

window.moveCarousel = function(workId, dir, total){
  let idx = carouselIndexMap[workId] || 0; idx += dir;
  if(idx < 0) idx = total - 1; if(idx >= total) idx = 0;
  carouselIndexMap[workId] = idx;
  const track = document.getElementById(`track-${workId}`);
  if(track) track.style.transform = `translateX(-${idx * 100}%)`;
  const ind = document.getElementById(`indicator-${workId}`);
  if(ind) ind.innerText = `${idx + 1} / ${total}`;
};

function getChildName(id){ const c = childrenData.find(item=>item.id===id); return c ? c.name : "不明な子ども"; }
function getCategoryTag(cat){
  if(cat === 'print') return `<span class="tag tag-print">📄 プリント</span>`;
  if(cat === 'exam') return `<span class="tag tag-exam">💯 テスト</span>`;
  return `<span class="tag tag-artwork">🎨 作品</span>`;
}

function renderGallery(){
  const c = document.getElementById("galleryContainer"); if(!c) return; c.innerHTML = "";
  const list = worksData.filter(w => !w.isDeleted);
  if(list.length === 0){ c.className = "text-center py-12 text-sm text-neutral-400 col-span-2"; c.innerText = "登録されたデータがありません。右下の「+」から登録しましょう！"; return; }
  c.className = "grid grid-cols-2 gap-4";
  list.forEach(w => {
    const d = document.createElement("div"); d.className = "card p-3 flex flex-col gap-2 relative";
    let thumb = `<div class="w-full aspect-square bg-neutral-100 border border-neutral-200 rounded-xl flex items-center justify-center text-neutral-300 text-xs">🟢 なし</div>`;
    if(w.media && w.media.length > 0){
      if(w.media[0].type === 'video') thumb = `<div class="w-full aspect-square bg-black rounded-xl overflow-hidden relative"><video src="${w.media[0].url}" class="w-full h-full object-cover"></video><span class="media-badge">動画</span></div>`;
      else thumb = `<div class="w-full aspect-square bg-neutral-100 rounded-xl overflow-hidden"><img src="${w.media[0].url}" class="w-full h-full object-cover" loading="lazy"/></div>`;
    }
    d.innerHTML = `${thumb}<div><div class="text-xs font-bold opacity-60 truncate">${getChildName(w.childId)}</div><h3 class="font-bold text-sm truncate mt-0.5">${w.title}</h3><div class="text-[11px] opacity-40 mt-0.5">${w.date}</div><div class="mt-1.5">${getCategoryTag(w.category)}</div></div>`;
    d.onclick = () => openWorkEdit(w.id);
    c.appendChild(d);
  });
}

function renderTimeline(){
  const c = document.getElementById("timelineContainer"); if(!c) return; c.innerHTML = "";
  const list = worksData.filter(w => !w.isDeleted);
  if(list.length === 0){ c.innerHTML = `<div class="text-center py-12 text-sm text-neutral-400">データがありません</div>`; return; }
  list.forEach(w => {
    const d = document.createElement("div"); d.className = "card flex flex-col gap-3";
    const mediaHtml = buildCarouselHtml(w.media, w.id);
    d.innerHTML = `<div class="flex justify-between items-start"><div><span class="text-xs font-bold px-2 py-1 bg-neutral-100 rounded-md mr-1.5" style="color:var(--accent)">${getChildName(w.childId)}</span>${getCategoryTag(w.category)}<h3 class="font-bold text-base mt-2">${w.title}</h3><div class="text-xs opacity-40 mt-0.5">${w.date}</div></div><div class="flex gap-2"><button class="text-xs font-bold text-blue-600 bg-blue-50 px-2.5 py-1.5 rounded-lg" onclick="openWorkEdit('${w.id}')">編集</button><button class="text-xs font-bold text-red-500 bg-red-50 px-2.5 py-1.5 rounded-lg" onclick="trashWork('${w.id}')">削除</button></div></div>${mediaHtml}<p class="text-sm opacity-80 leading-relaxed whitespace-pre-wrap">${w.memo || '<span class="opacity-30 text-xs">メモはありません</span>'}</p>`;
    c.appendChild(d);
  });
}

function renderTrash(){
  const c = document.getElementById("trashContainer"); if(!c) return; c.innerHTML = "";
  const list = worksData.filter(w => w.isDeleted);
  if(list.length === 0){ c.className = "text-center py-12 text-sm text-neutral-400 col-span-2"; c.innerText = "ゴミ箱は空っぽです"; return; }
  c.className = "grid grid-cols-2 gap-4";
  list.forEach(w => {
    const d = document.createElement("div"); d.className = "card p-3 flex flex-col gap-2 relative opacity-70";
    let thumb = "";
    if(w.media && w.media.length > 0){
      if(w.media[0].type === 'video') thumb = `<div class="w-full aspect-square bg-black rounded-xl overflow-hidden"><video src="${w.media[0].url}" class="w-full h-full object-cover"></video></div>`;
      else thumb = `<div class="w-full aspect-square bg-neutral-100 rounded-xl overflow-hidden"><img src="${w.media[0].url}" class="w-full h-full object-cover"/></div>`;
    }
    d.innerHTML = `${thumb}<div><h3 class="font-bold text-sm truncate">${w.title}</h3></div><div class="grid grid-cols-2 gap-2 mt-1"><button class="btn btn-secondary py-1.5 text-xs font-bold" onclick="restoreWork('${w.id}')">戻す</button><button class="btn btn-danger py-1.5 text-xs font-bold" onclick="killWork('${w.id}')">消去</button></div>`;
    c.appendChild(d);
  });
}

window.openDrawer = function(t){
  if(t === 'work' && !document.getElementById("editingWorkId").value) {
    document.getElementById("workFormTitle").innerText = "データ登録"; document.getElementById("workForm").reset();
    document.getElementById("inputCategory").value = "artwork"; document.getElementById("mediaResultContainer").innerHTML = "";
    document.getElementById("inputDate").value = new Date().toISOString().split("T")[0]; base64MediaArray = [];
  }
  if(t === 'child') cancelChildEdit();
  document.getElementById(t+"Drawer").classList.add("open"); 
};

window.closeDrawer = function(t){ 
  if(t) {
    const el = document.getElementById(t+"Drawer");
    if(el) el.classList.remove('open');
  } else {
    document.querySelectorAll('.drawer').forEach(el=>el.classList.remove('open')); 
  }
};

window.switchPage = function(p){
  document.querySelectorAll('.page').forEach(el => el.classList.remove('active'));
  document.querySelectorAll('.nav-tab').forEach(el => el.classList.remove('active'));
  if(p === "gallery"){ document.getElementById("galleryPage").classList.add("active"); document.getElementById("nav-gallery").classList.add("active"); renderGallery(); } 
  else if (p === "records") { document.getElementById("recordsPage").classList.add("active"); document.getElementById("nav-records").classList.add("active"); renderTimeline(); } 
  else if (p === "trash") { document.getElementById("trashPage").classList.add("active"); renderTrash(); }
};

document.getElementById("inputDate").value = new Date().toISOString().split("T")[0];
</script>
