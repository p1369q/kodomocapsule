<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>こどものーと・かぷせる</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Kiwi+Maru:wght@400;500&family=Yomogi&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Kiwi Maru', serif;
            background-color: #fcfcf7;
            touch-action: manipulation;
        }
        .yomogi {
            font-family: 'Yomogi', cursive;
        }
        .custom-shadow {
            box-shadow: 0 4px 14px 0 rgba(0, 0, 0, 0.05);
        }
        .bottom-nav-item.active {
            color: #ef4444;
        }
        .hide-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .hide-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
        /* トースト通知のスタイル */
        #toast-container {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10000;
            width: 90%;
            max-width: 400px;
            pointer-events: none;
        }
        .toast {
            background-color: #1f2937;
            color: white;
            padding: 12px 16px;
            border-radius: 9999px;
            margin-bottom: 8px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            opacity: 0;
            transition: opacity 0.3s ease, transform 0.3s ease;
            transform: translateY(-20px);
            pointer-events: auto;
        }
        .toast.show {
            opacity: 1;
            transform: translateY(0);
        }
    </style>
</head>

        </button>

    <nav class="bg-white/90 backdrop-blur-md border-t border-gray-100 fixed bottom-0 left-0 right-0 max-w-md mx-auto h-16 flex items-center justify-around z-40 px-6 custom-shadow">
        <button class="bottom-nav-item flex flex-col items-center gap-0.5 text-gray-400 active transition-colors" data-screen="gallery">

    <script>
        // グローバルなトースト通知関数
        function showToast(message) {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.innerText = message;
            container.appendChild(toast);
            
            // リフローを強制してからクラス付与（アニメーションのため）
            toast.offsetHeight;
            toast.classList.add('show');
            
            setTimeout(() => {
                toast.classList.remove('show');
                setTimeout(() => {
                    toast.remove();
                }, 300);
            }, 3000);
        }

        const DUMMY_DATA = [
            {
                id: "dummy-1",
                type: "artwork",
                title: "にじいろのでんしゃ",
                date: "2026-05-15",
                ageYears: 5,
                ageMonths: 8,
                memo: "たくさんの色を使って、未来の電車を描いたそうです。屋根に大きなライトがついているのがこだわりポイントとのこと。",
                imageUrl: "https://images.unsplash.com/photo-1513364776144-60967b0f800f?auto=format&fit=crop&w=600&q=80"
            },
            {
                id: "dummy-2",
                type: "word",
                title: "「おみじゅ、くだしゃい」",
                date: "2026-05-10",
                ageYears: 2,
                ageMonths: 1,
                memo: "お水を上手に言えなくて「おみじゅ」になってしまうのが今だけのかわいさ。一生懸命コップを指差して教えてくれました。",
                imageUrl: null
            },
            {
                id: "dummy-3",
                type: "photo",
                title: "はじめてのどろんこ遊び",
                date: "2026-04-28",
                ageYears: 4,
                ageMonths: 3,
                memo: "保育園の園庭でドロドロになりながら満面の笑み。服をお洗濯するのは大変だったけれど、この笑顔が見られたから大満足！",
                imageUrl: "https://images.unsplash.com/photo-1596464716127-f2a82984de30?auto=format&fit=crop&w=600&q=80"
            }
        ];

        // ローカルストレージの初期化処理
        if (!localStorage.getItem('kodomo_capsule_data')) {
            localStorage.setItem('kodomo_capsule_data', JSON.stringify(DUMMY_DATA));
        }
    </script>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            let appData = JSON.stringify(DUMMY_DATA);
            
            try {
                const localData = localStorage.getItem('kodomo_capsule_data');
                if (localData) {
                    appData = localData;
                }
            } catch (e) {
                console.error("LocalStorageへのアクセスに失敗しました:", e);
            }

            const items = JSON.parse(appData);

            // DOM要素の取得
            const galleryGrid = document.getElementById('gallery-grid');
            const timelineContainer = document.getElementById('timeline-container');
            const filterTabs = document.querySelectorAll('.filter-tab');
            const navItems = document.querySelectorAll('.bottom-nav-item');
            const screens = document.querySelectorAll('.screen');
            const btnSettings = document.getElementById('btn-settings');
            const btnFab = document.getElementById('btn-fab');
            const btnExportBackup = document.getElementById('btn-export-backup');
            const inputImportBackup = document.getElementById('input-import-backup');
            const modalExport = document.getElementById('modal-export');
            const exportStatus = document.getElementById('export-status');

            let currentFilter = 'all';

            // 画像を32x32pxのニアレストネイバーでリサイズする共通関数（CORS対策版）
            function resizeImageTo32px(imageUrl) {
                return new Promise((resolve, reject) => {
                    const img = new Image();
                    
                    // ★CORSエラー対策: 別のオリジン(Firebase Storage等)からの画像読み込みを許可する
                    img.crossOrigin = "anonymous";
                    
                    img.onload = () => {
                        try {
                            const canvas = document.createElement('canvas');
                            canvas.width = 32;
                            canvas.height = 32;
                            const ctx = canvas.getContext('2d');
                            
                            // ニアレストネイバー（ドット感を残す）を有効にする
                            ctx.imageSmoothingEnabled = false;
                            ctx.webkitImageSmoothingEnabled = false;
                            ctx.mozImageSmoothingEnabled = false;
                            ctx.msImageSmoothingEnabled = false;
                            
                            ctx.drawImage(img, 0, 0, 32, 32);
                            resolve(canvas);
                        } catch (err) {
                            console.error("★crossOrigin Image (ts付き) 失敗: 画像の読み込みに失敗しました", err);
                            reject(new Error("Canvas処理中にエラーが発生しました（セキュリティ制限の可能性があります）。"));
                        }
                    };
                    
                    img.onerror = (err) => {
                        console.error("★crossOrigin Image (素のURL) 失敗: 画像の読み込みに失敗しました", err);
                        
                        // フォールバック: キャッシュによるCORS回避を狙い、タイムスタンプを付与してリトライ
                        if (!imageUrl.includes('cors_retry=')) {
                            const separator = imageUrl.includes('?') ? '&' : '?';
                            const retryUrl = imageUrl + separator + 'cors_retry=' + new Date().getTime();
                            console.log("キャッシュ回避のため、クエリ付きURLで再試行します:", retryUrl);
                            
                            const retryImg = new Image();
                            retryImg.crossOrigin = "anonymous";
                            retryImg.onload = () => {
                                try {
                                    const canvas = document.createElement('canvas');
                                    canvas.width = 32;
                                    canvas.height = 32;
                                    const ctx = canvas.getContext('2d');
                                    ctx.imageSmoothingEnabled = false;
                                    ctx.drawImage(retryImg, 0, 0, 32, 32);
                                    resolve(canvas);
                                } catch (retryErr) {
                                    reject(retryErr);
                                }
                            };
                            retryImg.onerror = (retryErr) => {
                                reject(retryErr);
                            };
                            retryImg.src = retryUrl;
                        } else {
                            reject(err);
                        }
                    };
                    
                    img.src = imageUrl;
                });
            }

            // Minecraft Function書き出し処理のコア関数
            async function exportToMinecraft(item) {
                if (!item.imageUrl) {
                    showToast("この作品には画像がありません。");
                    return;
                }

                // モーダル表示アニメーション
                modalExport.classList.remove('hidden');
                setTimeout(() => modalExport.classList.add('opacity-100'), 10);
                const modalContent = modalExport.querySelector('div');
                modalContent.classList.remove('scale-95');
                modalContent.classList.add('scale-100');

                try {
                    exportStatus.innerText = "画像を32x32ドットにリサイズ中...";
                    const canvas = await resizeImageTo32px(item.imageUrl);
                    const ctx = canvas.getContext('2d');
                    const imgData = ctx.getImageData(0, 0, 32, 32).data;

                    exportStatus.innerText = "マインクラフトのブロックへ変換中...";
                    // 1秒待機して進捗をユーザーに体感させる
                    await new Promise(r => setTimeout(r, 1000));

                    // カラーマッチングロジック (簡易的な代表12色)
                    const blockPalette = [
                        { r: 240, g: 240, b: 240, block: "minecraft:white_wool" },
                        { r: 40,  g: 40,  b: 40,  block: "minecraft:black_wool" },
                        { r: 160, g: 160, b: 160, block: "minecraft:light_gray_wool" },
                        { r: 180, g: 40,  b: 40,  block: "minecraft:red_wool" },
                        { r: 220, g: 140, b: 40,  block: "minecraft:orange_wool" },
                        { r: 230, g: 210, b: 40,  block: "minecraft:yellow_wool" },
                        { r: 60,  g: 160, b: 40,  block: "minecraft:green_wool" },
                        { r: 40,  g: 120, b: 200, block: "minecraft:blue_wool" },
                        { r: 140, g: 60,  b: 180, block: "minecraft:purple_wool" },
                        { r: 220, g: 120, b: 160, block: "minecraft:pink_wool" },
                        { r: 120, g: 80,  b: 40,  block: "minecraft:brown_wool" },
                        { r: 100, g: 200, b: 220, block: "minecraft:light_blue_wool" }
                    ];

                    let commands = [];
                    commands.push("# Generated by kodomo-capsule");
                    commands.push(`# Title: ${item.title}`);

                    for (let y = 0; y < 32; y++) {
                        for (let x = 0; x < 32; x++) {
                            const idx = (y * 32 + x) * 4;
                            const r = imgData[idx];
                            const g = imgData[idx+1];
                            const b = imgData[idx+2];
                            const a = imgData[idx+3];

                            if (a < 128) continue; // 透明ピクセルはスキップ

                            // 最も近い色を検索 (ユークリッド距離の最小化)
                            let minDistance = Infinity;
                            let bestBlock = "minecraft:white_wool";

                            for (const pal of blockPalette) {
                                const dist = Math.pow(r - pal.r, 2) + Math.pow(g - pal.g, 2) + Math.pow(b - pal.b, 2);
                                if (dist < minDistance) {
                                    minDistance = dist;
                                    bestBlock = pal.block;
                                }
                            }

                            // マイクラ内では、Z軸を水平(横)、Y軸を垂直(縦)としてドット絵を垂直に直立させる配置
                            // プレイヤーの足元(相対座標)から配置するコマンドを生成
                            const mcX = x;
                            const mcY = 31 - y; // 上下が反転するのを防ぐ
                            commands.push(`setblock ~${mcX} ~${mcY} ~ ${bestBlock}`);
                        }
                    }

                    // .mcfunction ファイルとしてダウンロード
                    const blob = new Blob([commands.join("\n")], { type: "text/plain;charset=utf-8" });
                    const url = URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url;
                    // ファイル名は英数字のみに安全化（日本語エラー回避）
                    const safeTitle = item.id;
                    a.download = `draw_${safeTitle}.mcfunction`;
                    document.body.appendChild(a);
                    a.click();
                    document.body.removeChild(a);
                    URL.revokeObjectURL(url);

                    showToast("マイクラ用ファイルの書き出しに成功しました！");

                } catch (error) {
                    console.error("★Minecraft書き出しエラー:", error);
                    // ユーザーへのエラーダイアログ（具体的な状況説明）
                    alert("★Minecraft書き出しエラー: Error: 画像の変換に失敗しました（ブラウザのセキュリティ制限）。\nお手数ですが、編集画面からこの作品の写真を一度撮り直す/選び直して保存し直すと解決する場合があります。");
                } finally {
                    // モーダルを閉じる
                    modalExport.classList.remove('opacity-100');
                    modalContent.classList.remove('scale-100');
                    modalContent.classList.add('scale-95');
                    setTimeout(() => modalExport.classList.add('hidden'), 300);
                }
            }

            // ギャラリーのHTMLレンダリング関数
            function renderGallery() {
                galleryGrid.innerHTML = '';
                const filtered = items.filter(item => currentFilter === 'all' || item.type === currentFilter);

                if (filtered.length === 0) {
                    galleryGrid.innerHTML = `
                        <div class="text-center py-12 text-gray-400">
                            <i class="fa-solid fa-box-open text-4xl mb-2"></i>
                            <p class="text-sm">まだ記録がありません</p>
                        </div>
                    `;
                    return;
                }

                filtered.forEach(item => {
                    const card = document.createElement('div');
                    card.className = 'bg-white rounded-2xl overflow-hidden border border-gray-100 custom-shadow flex flex-col';
                    
                    let badgeColor = 'bg-red-500';
                    let badgeText = '作品';
                    if (item.type === 'word') { badgeColor = 'bg-blue-500'; badgeText = 'ことば'; }
                    if (item.type === 'photo') { badgeColor = 'bg-emerald-500'; badgeText = '写真'; }

                    let imageHtml = '';
                    if (item.imageUrl) {
                        imageHtml = `
                            <div class="relative aspect-video w-full bg-gray-50 overflow-hidden">
                                <img src="${item.imageUrl}" alt="${item.title}" class="w-full h-full object-cover">
                            </div>
                        `;
                    } else if (item.type === 'word') {
                        imageHtml = `
                            <div class="w-full py-8 px-6 bg-blue-50/50 flex items-center justify-center border-b border-gray-50">
                                <p class="yomogi text-2xl text-blue-600 font-bold text-center leading-relaxed">” ${item.title} ”</p>
                            </div>
                        `;
                    }

                    // 「マイクラへ」ボタンは画像が存在する場合のみ表示
                    const minecraftButtonHtml = item.imageUrl ? `
                        <button class="btn-minecraft-export px-3 py-1.5 bg-zinc-800 text-white rounded-xl text-xs font-bold flex items-center gap-1.5 hover:bg-zinc-700 active:scale-95 transition-all" data-id="${item.id}">
                            <i class="fa-solid fa-cube text-green-400"></i> マイクラへ
                        </button>
                    ` : '';

                    card.innerHTML = `
                        ${imageHtml}
                        <div class="p-4 flex-1 flex flex-col justify-between">
                            <div>
                                <div class="flex items-center justify-between mb-1.5">
                                    <span class="text-[10px] text-white px-2 py-0.5 rounded-full font-bold ${badgeColor}">${badgeText}</span>
                                    <span class="text-xs font-bold text-amber-600/90 bg-amber-50 px-2 py-0.5 rounded-md flex items-center gap-1">
                                        <i class="fa-solid fa-cake-candles text-[10px]"></i> ${item.ageYears}歳${item.ageMonths}ヶ月
                                    </span>
                                </div>
                                <h3 class="font-bold text-gray-800 text-base mb-1">${item.type === 'word' ? 'あのときの一言' : item.title}</h3>
                                <p class="text-xs text-gray-500 line-clamp-3 leading-relaxed mb-4">${item.memo || ''}</p>
                            </div>
                            <div class="flex items-center justify-between pt-2 border-t border-gray-50">
                                <span class="text-[11px] text-gray-400 font-medium"><i class="fa-regular fa-calendar mr-1"></i>${item.date}</span>
                                <div class="flex gap-2">
                                    ${minecraftButtonHtml}
                                    <button class="w-8 h-8 rounded-xl bg-gray-50 text-gray-400 hover:text-red-500 hover:bg-red-50 flex items-center justify-center transition-colors">
                                        <i class="fa-solid fa-ellipsis"></i>
                                    </button>
                                </div>
                            </div>
                        </div>
                    `;

                    // マイクラ書き出しイベントの紐付け
                    const btnExport = card.querySelector('.btn-minecraft-export');
                    if (btnExport) {
                        btnExport.addEventListener('click', (e) => {
                            e.stopPropagation();
                            exportToMinecraft(item);
                        });
                    }

                    galleryGrid.appendChild(card);
                });
            }

            // タイムラインのHTMLレンダリング関数
            function renderTimeline() {
                timelineContainer.innerHTML = '';
                
                // 日付の降順でソート
                const sortedItems = [...items].sort((a, b) => new Date(b.date) - new Date(a.date));

                if (sortedItems.length === 0) {
                    timelineContainer.innerHTML = `<p class="text-sm text-gray-400 text-center py-6">タイムラインのデータがありません</p>`;
                    return;
                }

                sortedItems.forEach(item => {
                    const node = document.createElement('div');
                    node.className = 'relative flex gap-4 items-start';

                    let iconColor = 'text-red-500 bg-red-100';
                    let iconClass = 'fa-solid fa-palette';
                    if (item.type === 'word') { iconColor = 'text-blue-500 bg-blue-100'; iconClass = 'fa-solid fa-comment-dots'; }
                    if (item.type === 'photo') { iconColor = 'text-emerald-500 bg-emerald-100'; iconClass = 'fa-solid fa-camera'; }

                    node.innerHTML = `
                        <div class="absolute -left-[33px] w-4 h-4 rounded-full bg-white border-4 border-red-400 z-10 mt-1.5"></div>
                        
                        <div class="flex-1 bg-white p-3.5 rounded-2xl border border-gray-100 custom-shadow flex gap-3 items-center">
                            ${item.imageUrl ? `
                                <div class="w-14 h-14 rounded-xl overflow-hidden bg-gray-50 flex-shrink-0">
                                    <img src="${item.imageUrl}" class="w-full h-full object-cover">
                                </div>
                            ` : `
                                <div class="w-14 h-14 rounded-xl ${iconColor} flex items-center justify-center text-lg flex-shrink-0">
                                    <i class="${iconClass}"></i>
                                </div>
                            `}
                            <div class="overflow-hidden flex-1">
                                <div class="flex items-baseline justify-between gap-1 mb-0.5">
                                    <h4 class="font-bold text-sm text-gray-800 truncate">${item.title}</h4>
                                    <span class="text-[10px] font-bold text-amber-600 whitespace-nowrap bg-amber-50 px-1.5 py-0.5 rounded">${item.ageYears}歳${item.ageMonths}m</span>
                                </div>
                                <p class="text-[11px] text-gray-400"><i class="fa-regular fa-calendar mr-1"></i>${item.date}</p>
                            </div>
                        </div>
                    `;
                    timelineContainer.appendChild(node);
                });
            }

            // 画面切り替えロジック
            function switchScreen(screenId) {
                screens.forEach(s => s.classList.add('hidden'));
                document.getElementById(`screen-${screenId}`).classList.remove('hidden');

                navItems.forEach(nav => {
                    if (nav.getAttribute('data-screen') === screenId) {
                        nav.classList.add('active');
                        nav.classList.remove('text-gray-400');
                    } else {
                        nav.classList.remove('active');
                        nav.classList.add('text-gray-400');
                    }
                });

                if (screenId === 'gallery') renderGallery();
                if (screenId === 'timeline') renderTimeline();
            }

            // ナビゲーションイベント
            navItems.forEach(item => {
                item.addEventListener('click', () => switchScreen(item.getAttribute('data-screen')));
            });

            btnSettings.addEventListener('click', () => {
                switchScreen('settings');
                navItems.forEach(nav => nav.classList.remove('active', 'text-gray-400'));
                navItems.forEach(nav => nav.classList.add('text-gray-400'));
            });

            // フィルタータブイベント
            filterTabs.forEach(tab => {
                tab.addEventListener('click', () => {
                    filterTabs.forEach(t => {
                        t.classList.remove('bg-red-500', 'text-white');
                        t.classList.add('bg-white', 'text-gray-500', 'border', 'border-gray-100');
                    });
                    tab.classList.remove('bg-white', 'text-gray-500', 'border', 'border-gray-100');
                    tab.classList.add('bg-red-500', 'text-white');

                    currentFilter = tab.getAttribute('data-filter');
                    renderGallery();
                });
            });

            // バックアップ エクスポート処理
            btnExportBackup.addEventListener('click', () => {
                const dataStr = localStorage.getItem('kodomo_capsule_data') || "[]";
                const blob = new Blob([dataStr], { type: "application/json" });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `kodomo_capsule_backup_${new Date().toISOString().slice(0,10)}.json`;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(url);
                showToast("データをエクスポートしました");
            });

            // バックアップ インポート処理
            inputImportBackup.addEventListener('change', (e) => {
                const file = e.target.files[0];
                if (!file) return;

                const reader = new FileReader();
                reader.onload = (event) => {
                    try {
                        const parsed = JSON.parse(event.target.result);
                        if (Array.isArray(parsed)) {
                            localStorage.setItem('kodomo_capsule_data', JSON.stringify(parsed));
                            showToast("データを正常に復元しました！");
                            // データを再読み込みして画面反映
                            setTimeout(() => { location.reload(); }, 1000);
                        } else {
                            alert("不正なファイル形式です。バックアップ用のJSONファイルを選択してください。");
                        }
                    } catch (err) {
                        alert("ファイルの読み込みに失敗しました。");
                    }
                };
                reader.readAsText(file);
            });

            // プラスボタン（FAB）ダミーイベント
            btnFab.addEventListener('click', () => {
                showToast("機能制限: ステージング環境では新規追加はデモ用にロックされています。");
            });

            // 初期レンダリング
            renderGallery();
        });
    </script>
</body>
</html>
