<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>コドモノート [v38] デバッグ版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-storage-compat.js"></script>

    <script src="https://js.stripe.com/v3/"></script>

    <style>
        body {
            font-family: 'Plus Jakarta Sans', 'Noto Sans JP', sans-serif;
            background-color: #f1f5f9;
        }
        .modal-overlay {
            background-color: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(4px);
        }
    </style>
</head>
<body class="text-slate-800 antialiased min-h-screen flex flex-col">

    <header class="bg-white border-b border-slate-200 sticky top-0 z-40 px-4 py-3 flex items-center justify-between shadow-sm">
        <div class="flex items-center space-x-3">
            <span class="text-2xl">🎨</span>
            <h1 class="text-xl font-bold tracking-tight text-slate-900">コドモノート</h1>
            <span class="text-xs font-semibold bg-indigo-50 text-indigo-700 border border-indigo-200 px-2 py-0.5 rounded-full">v38-Stripeテスト版</span>
        </div>
        <div class="flex items-center space-x-2">
            <button id="settings-btn" class="p-2 text-slate-500 hover:text-slate-700 rounded-full hover:bg-slate-100 transition">⚙️ 設定・プレミアム登録</button>
        </div>
    </header>

    <main class="flex-1 max-w-4xl w-full mx-auto p-4 md:p-6 flex flex-col items-center justify-center">
        
        <div class="w-full max-w-md bg-white rounded-2xl border border-slate-200 p-6 shadow-md my-4">
            <h3 class="text-base font-bold text-slate-900 flex items-center space-x-1 mb-3">
                <span>👑</span> <span>Stripe 決済テスト（ダイレクト起動）</span>
            </h3>
            <div class="bg-gradient-to-br from-indigo-50 to-purple-50 border border-indigo-100 rounded-xl p-4 shadow-sm">
                <div class="flex items-center justify-between mb-2">
                    <span class="text-xs font-bold bg-indigo-100 text-indigo-700 px-2 py-0.5 rounded-full">プレミアムプラン</span>
                    <span class="text-lg font-bold text-slate-900">¥300 <span class="text-xs font-normal text-slate-500">/ 月</span></span>
                </div>
                <p class="text-xs text-slate-600 mb-4 leading-relaxed">
                    ボタンを押すと、StripeのCheckout決済画面（かわかわ テスト環境）にジャンプします。
                </p>
                <button id="direct-stripe-btn" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3 px-4 rounded-xl text-sm transition flex items-center justify-center space-x-2 shadow-sm">
                    <span>💳</span> <span>プレミアムプラン決済を試す</span>
                </button>
            </div>
            <div id="debug-status" class="mt-3 text-[11px] text-slate-400 text-center font-mono">
                Stripe状態: 準備中...
            </div>
        </div>

        <div id="setup-view" class="w-full max-w-md bg-white rounded-2xl border border-slate-200 p-6 shadow-sm">
            <h2 class="text-xl font-bold text-center text-slate-900 mb-2">家族グループの設定</h2>
            <div class="space-y-4 mt-4">
                <button id="create-family-btn" class="w-full bg-emerald-600 text-white font-bold py-3 px-4 rounded-xl hover:bg-emerald-700 transition text-sm">
                    🚀 新しい家族グループを作成する
                </button>
                <div class="relative flex py-2 items-center">
                    <div class="flex-grow border-t border-slate-200"></div>
                    <span class="flex-shrink mx-4 text-slate-400 text-xs">または</span>
                    <div class="flex-grow border-t border-slate-200"></div>
                </div>
                <div class="space-y-2">
                    <input type="text" id="join-family-code" placeholder="家族招待コードを入力" class="w-full border border-slate-300 rounded-xl px-4 py-2.5 text-sm" />
                    <button id="join-family-btn" class="w-full bg-slate-800 text-white font-bold py-2.5 px-4 rounded-xl text-sm">合流する</button>
                </div>
            </div>
        </div>
    </main>

    <div id="settings-modal" class="fixed inset-0 z-50 modal-overlay flex items-center justify-center p-4 hidden">
        <div class="bg-white rounded-2xl max-w-md w-full shadow-xl border border-slate-200 p-6 space-y-4">
            <div class="flex items-center justify-between border-b border-slate-100 pb-3">
                <h2 class="text-lg font-bold text-slate-900">アカウント・設定</h2>
                <button id="close-settings-btn" class="text-slate-400 hover:text-slate-600 text-2xl font-semibold">&times;</button>
            </div>
            <div>
                <p class="text-xs font-bold text-slate-400 uppercase tracking-wider mb-2">📋 家族招待コード</p>
                <div class="flex gap-2">
                    <input type="text" id="family-code-display" readonly value="未発行" class="flex-1 bg-slate-50 border border-slate-300 rounded-xl px-3 py-2 text-xs font-mono" />
                </div>
            </div>
            <div class="border-t border-slate-100 pt-4">
                <p class="text-xs text-slate-500 mb-2">※右上の閉じるボタン(&times;)で戻れます。</p>
            </div>
        </div>
    </div>

    <script>
        // -------------------------------------------------------------------------
        // 🔑 CONFIGURATION (ご自身のFirebaseのキーを設定してください)
        // -------------------------------------------------------------------------
        const firebaseConfig = {
            apiKey: "AIzaSyA...",
            authDomain: "kodomonote-prod.firebaseapp.com",
            projectId: "kodomonote-prod",
            storageBucket: "kodomonote-prod.firebasestorage.app",
            messagingSenderId: "1234567890",
            appId: "1:1234567890:web:abcdef"
        };
        
        // 安全対策: 初期キーのままの場合はコンソール警告を出すだけで落ちないようにガード
        try {
            firebase.initializeApp(firebaseConfig);
        } catch(e) {
            console.warn("Firebase initialization skipped or failed:", e.message);
        }

        const db = typeof firebase !== 'undefined' && firebase.firestore ? firebase.firestore() : null;
        const auth = typeof firebase !== 'undefined' && firebase.auth ? firebase.auth() : null;

        // -------------------------------------------------------------------------
        // 💳 STRIPE INTEGRATION SETUP
        // -------------------------------------------------------------------------
        const STRIPE_PUBLISHABLE_KEY = 'pk_test_51TiW2M2XPPikXao88nEDITwowuJMEXNqor6tPljD1DbatiND10xKtExoBIaVw3QLbU7itLrpxwEbYHoYkny05FRo00SPnzYHNf'; 
        const STRIPE_PRICE_ID = 'price_1TiWZq2XPPikXao8uSHGWojN'; 

        let stripe = null;
        try {
            stripe = Stripe(STRIPE_PUBLISHABLE_KEY);
            document.getElementById('debug-status').innerText = "Stripe有効: " + STRIPE_PRICE_ID;
        } catch (err) {
            document.getElementById('debug-status').innerText = "Stripe読み込みエラー: " + err.message;
        }

        let currentUser = null;

        // 🚀 決済処理 (Firebaseのログイン状態を無視して、クリックされたら即座にStripeに飛ばす安全設計)
        document.getElementById('direct-stripe-btn').addEventListener('click', async () => {
            if (!stripe) {
                alert('Stripeが正しく初期化されていません。');
                return;
            }

            const btn = document.getElementById('direct-stripe-btn');
            btn.disabled = true;
            btn.innerHTML = '🔄 決済画面へ移動中...';

            // ログインユーザーがいればそのUIDを、いなければ一時的なゲストトークンをセット
            const clientRef = (currentUser && currentUser.uid) ? currentUser.uid : 'guest_test_' + Date.now();

            try {
                const { error } = await stripe.redirectToCheckout({
                    lineItems: [{ price: STRIPE_PRICE_ID, quantity: 1 }],
                    mode: 'subscription',
                    successUrl: window.location.origin + window.location.pathname + '?stripe_status=success',
                    cancelUrl: window.location.origin + window.location.pathname + '?stripe_status=cancel',
                    clientReferenceId: clientRef
                });
                if (error) throw error;
            } catch (err) {
                console.error("Stripe Checkout Error:", err);
                alert("Stripe決済の起動に失敗しました: " + err.message);
                btn.disabled = false;
                btn.innerHTML = '<span>💳</span> <span>プレミアムプラン決済を試す</span>';
            }
        });

        // ⚙️ モーダルの開閉
        document.getElementById('settings-btn').addEventListener('click', () => {
            document.getElementById('settings-modal').classList.remove('hidden');
        });
        document.getElementById('close-settings-btn').addEventListener('click', () => {
            document.getElementById('settings-modal').classList.add('hidden');
        });

        // Firebase 認証の監視 (動かなくても画面が真っ白にならないように配慮)
        if (auth) {
            auth.onAuthStateChanged(async (user) => {
                if (user) {
                    currentUser = user;
                    document.getElementById('debug-status').innerText += " (Firebaseログイン済)";
                    if (db) {
                        const userDoc = await db.collection('users').doc(user.uid).get();
                        if (userDoc.exists && userDoc.data().familyId) {
                            document.getElementById('family-code-display').value = userDoc.data().familyId;
                        }
                    }
                } else {
                    auth.signInAnonymously().catch(err => console.log("匿名サインイン待機中..."));
                }
            });
        }

        // URLパラメータの成功/キャンセル検知
        const urlParams = new URLSearchParams(window.location.search);
        if (urlParams.get('stripe_status') === 'success') {
            alert('🎉 プレミアムプランの登録（テスト）が成功しました！');
            window.history.replaceState({}, document.title, window.location.pathname);
        } else if (urlParams.get('stripe_status') === 'cancel') {
            alert('決済手続きがキャンセルされました。');
            window.history.replaceState({}, document.title, window.location.pathname);
        }
    </script>
</body>
</html>
