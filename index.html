<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>コドモノート (Kodomonote)</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    window.cvReady = false;
    function onOpenCvScriptLoad() {
      try {
        if (window.cv && typeof cv['onRuntimeInitialized'] !== 'undefined') {
          cv['onRuntimeInitialized'] = () => { window.cvReady = true; };
        } else {
          const check = setInterval(() => {
            if (window.cv && cv.Mat) { window.cvReady = true; clearInterval(check); }
          }, 200);
          setTimeout(() => clearInterval(check), 15000);
        }
      } catch(e) { console.error("OpenCV initialization tracking failed:", e); }
    }
  </script>
  <script async src="https://docs.opencv.org/4.x/opencv.js" onload="onOpenCvScriptLoad()"></script>

  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: { ivory: '#FDFAF5', kraft: '#E8D9C0', sage: '#7C9E87', coral: '#E07A5F', ink: '#3D3530', muted: '#9B8B80', cardBg: '#FFFDF8' },
          fontFamily: { display: ['Nunito', 'sans-serif'], body: ['Noto Sans JP', 'sans-serif'] },
        }
      }
    }
  </script>
  <style>
    * { -webkit-tap-highlight-color: transparent; font-family: 'Noto Sans JP', 'Nunito', sans-serif; }
    body { background-color: #FDFAF5; color: #3D3530; overflow-x: hidden; }
    .notebook-line { background-image: linear-gradient(#E8D9C0 1px, transparent 1px); background-size: 100% 2rem; }
    .drawer, .modal-backdrop { transition: all 0.35s cubic-bezier(0.16, 1, 0.3, 1); opacity: 0; pointer-events: none; }
    .drawer { transform: translateY(100%); }
    .drawer.open { transform: translateY(0); opacity: 1; pointer-events: auto; }
    .modal-backdrop.open { opacity: 1; pointer-events: auto; }
    .detail-modal { transition: all 0.3s ease; transform: scale(0.9) translateY(20px); opacity: 0; pointer-events: none; }
    .detail-modal.open { transform: scale(1) translateY(0); opacity: 1; pointer-events: auto; }
    .child-tab { transition: all 0.2s ease; }
    .child-tab.active { background-color: #7C9E87; color: white; box-shadow: 0 4px 6px -1px rgba(124, 158, 135, 0.3); }
    .toast { transition: all 0.3s ease; transform: translate(-50%, 2rem); opacity: 0; }
    .toast.show { transform: translate(-50%, 0); opacity: 1; }
    .btn-bounce:active { transform: scale(0.96); }
    .loading-spinner { border: 3px solid rgba(124,158,135,0.2); border-top: 3px solid #7C9E87; border-radius: 50%; width: 24px; height: 24px; animation: spin 0.8s linear infinite; }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
  </style>
</head>
<body class="min-h-screen flex flex-col pb-24">

  <header class="sticky top-0 z-30 bg-ivory/90 backdrop-blur-md border-b border-kraft/40 px-4 pt-3 pb-3">
    <div class="max-w-md mx-auto flex items-center justify-between">
      <div>
        <h1 class="text-2xl font-display font-800 tracking-tight text-ink flex items-center gap-1.5">
          <span>📖</span>コドモノート
          <span class="text-xs font-body font-500 bg-sage/10 text-sage px-2 py-0.5 rounded-full border border-sage/20">Beta</span>
        </h1>
        <p class="text-[10px] text-muted font-medium mt-0.5" id="authStatusText">デモモード (保存先: ブラウザ)</p>
      </div>
      <div class="flex items-center gap-2">
        <button id="authBtn" class="btn-bounce bg-white border border-kraft text-ink rounded-full px-3 py-1.5 text-xs font-semibold shadow-sm flex items-center gap-1">
          <span>👤</span><span id="authBtnText">ログイン</span>
        </button>
        <button onclick="openDrawer('child')" class="btn-bounce bg-sage text-white rounded-full p-2 shadow-md">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M10.5 6h9.75M10.5 6a1.5 1.5 0 1 1-3 0m3 0a1.5 1.5 0 1 0-3 0M3.75 6H7.5m3 12h9.75m-9.75 0a1.5 1.5 0 0 1-3 0m3 0a1.5 1.5 0 0 0-3 0m-3.75 0H7.5m9-6h3.75m-3.75 0a1.5 1.5 0 0 1-3 0m3 0a1.5 1.5 0 0 0-3 0m-9.75 0h9.75"></path></svg>
        </button>
      </div>
    </div>
  </header>

  <main class="flex-1 w-full max-w-md mx-auto px-4 mt-4">
    <section class="bg-cardBg border border-kraft/60 rounded-2xl p-4 shadow-sm mb-5">
      <div class="relative mb-3">
        <span class="absolute inset-y-0 left-0 flex items-center pl-3 text-muted">🔍</span>
        <input type="text" id="searchBar" oninput="triggerFilter()" placeholder="タイトルやメモでさがす..." class="w-full bg-ivory border border-kraft/40 rounded-xl pl-9 pr-4 py-2 text-sm text-ink focus:outline-none focus:border-sage placeholder-muted/60" />
      </div>
      <div class="flex items-center gap-2">
        <select id="gradeFilter" onchange="triggerFilter()" class="flex-1 bg-ivory border border-kraft/40 rounded-xl px-3 py-2 text-xs text-ink focus:outline-none focus:border-sage font-medium">
          <option value="all">すべての時期</option>
          <option value="preschool">小学校前</option>
          <option value="g1">小学1年生</option>
          <option value="g2">小学2年生</option>
          <option value="g3">小学3年生</option>
          <option value="g4">小学4年生</option>
          <option value="g5">小学5年生</option>
          <option value="g6">小学6年生</option>
        </select>
        <button id="sortBtn" onclick="toggleSort()" class="btn-bounce bg-ivory border border-kraft/40 rounded-xl px-3 py-2 text-xs text-ink font-semibold flex items-center gap-1 shadow-sm whitespace-nowrap">
          <span>📅</span><span id="sortBtnText">新しい順</span>
        </button>
      </div>
    </section>

    <div class="flex items-center gap-2 overflow-x-auto pb-3 mb-2 no-scrollbar" id="childTabsContainer">
      </div>

    <div class="flex items-center gap-2 mb-4">
      <button onclick="setCategoryFilter('all')" id="cat-all" class="cat-chip btn-bounce active bg-ink text-white rounded-full px-4 py-1.5 text-xs font-semibold shadow-sm">すべて</button>
      <button onclick="setCategoryFilter('art')" id="cat-art" class="cat-chip btn-bounce bg-white border border-kraft text-ink rounded-full px-4 py-1.5 text-xs font-semibold shadow-sm">🎨 絵・工作</button>
      <button onclick="setCategoryFilter('study')" id="cat-study" class="cat-chip btn-bounce bg-white border border-kraft text-ink rounded-full px-4 py-1.5 text-xs font-semibold shadow-sm">📝 テスト・プリント</button>
      <button onclick="setCategoryFilter('other')" id="cat-other" class="cat-chip btn-bounce bg-white border border-kraft text-ink rounded-full px-4 py-1.5 text-xs font-semibold shadow-sm">🌟 その他</button>
    </div>

    <div id="galleryGrid" class="grid grid-cols-2 gap-3.5">
      </div>

    <div id="emptyState" class="hidden text-center py-16 px-4">
      <p class="text-4xl mb-3">🎨</p>
      <p class="text-ink font-bold text-base">おもいでを記録しよう</p>
      <p class="text-muted text-xs mt-1">下の「＋」ボタンから、こどもの作品やテストを登録できます。</p>
    </div>
  </main>

  <div class="fixed bottom-6 left-1/2 -translate-x-1/2 z-40 w-full max-w-md px-4 flex justify-center">
    <button onclick="openDrawer('work')" class="btn-bounce bg-coral text-white rounded-full px-7 py-3.5 font-display font-800 text-base shadow-lg flex items-center gap-2 tracking-wide border-2 border-white/20">
      <svg class="w-5 h-5 stroke-[3]" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M12 4.5v15m7.5-7.5h-15"></path></svg>
      <span>きろくする</span>
    </button>
  </div>

  <div id="modalBackdrop" onclick="closeAllPanels()" class="modal-backdrop fixed inset-0 bg-ink/50 backdrop-blur-sm z-40"></div>

  <div id="workDrawer" class="drawer fixed bottom-0 left-0 right-0 max-w-md mx-auto bg-ivory rounded-t-[2.5rem] shadow-2xl z-50 px-5 pt-4 pb-8 border-t border-kraft/40 max-h-[92vh] overflow-y-auto">
    <div class="w-12 h-1.5 bg-kraft/60 rounded-full mx-auto mb-5"></div>
    <div class="flex items-center justify-between mb-4">
      <h2 id="workDrawerTitle" class="text-lg font-bold text-ink">🎨 おもいでをきろく</h2>
      <button onclick="closeDrawer('work')" class="text-muted p-1 text-sm font-semibold">とじる</button>
    </div>

    <form id="workForm" onsubmit="handleWorkSubmit(event)" class="space-y-4">
      <input type="hidden" id="editingWorkId" value="" />
      
      <div>
        <label class="block text-xs font-bold text-ink mb-1.5">写真・動画</label>
        <div id="mediaPlaceholder" onclick="document.getElementById('fileInput').click()" class="bg-cardBg border-2 border-dashed border-kraft rounded-2xl p-6 text-center cursor-pointer hover:bg-kraft/10 transition flex flex-col items-center justify-center min-h-[140px]">
          <span class="text-3xl mb-1.5">📸</span>
          <span class="text-xs text-ink font-bold">カメラ起動 / カメラロールから選択</span>
          <span class="text-[10px] text-muted mt-1">※自動書類スキャンが自動適用されます</span>
        </div>
        <input type="file" id="fileInput" accept="image/*,video/*" onchange="handleFileSelect(event)" class="hidden" />
        
        <div id="mediaResultContainer" class="hidden relative rounded-2xl overflow-hidden border border-kraft bg-black flex items-center justify-center max-h-64">
          <img id="mediaPreview" class="object-contain max-w-full max-h-64" src="" alt="Preview" />
          <video id="videoPreview" class="hidden max-w-full max-h-64" controls></video>
          <button type="button" onclick="clearMediaSelection()" class="absolute top-2 right-2 bg-ink/70 text-white rounded-full p-1.5 text-xs">✕</button>
          <div id="scanOverlay" class="hidden absolute inset-0 bg-ink/60 flex flex-col items-center justify-center text-white text-xs font-medium gap-2">
            <div class="loading-spinner"></div>
            <span>書類のエッジを検出して補正中...</span>
          </div>
        </div>
      </div>

      <div>
        <label class="block text-xs font-bold text-ink mb-1.5">だれの作品？</label>
        <select id="inputWorkChild" required class="w-full bg-cardBg border border-kraft rounded-xl px-3 py-2.5 text-sm text-ink focus:outline-none focus:border-sage"></select>
      </div>

      <div>
        <label class="block text-xs font-bold text-ink mb-1.5">タイトル</label>
        <input type="text" id="inputTitle" required placeholder="例: うんどうかいの絵、さんすうのテスト" class="w-full bg-cardBg border border-kraft rounded-xl px-3 py-2.5 text-sm text-ink focus:outline-none focus:border-sage placeholder-muted/50" />
      </div>

      <div class="grid grid-cols-2 gap-3">
        <div>
          <label class="block text-xs font-bold text-ink mb-1.5">いつ作った？</label>
          <input type="date" id="inputDate" required class="w-full bg-cardBg border border-kraft rounded-xl px-3 py-2 text-sm text-ink focus:outline-none focus:border-sage" />
        </div>
        <div>
          <label class="block text-xs font-bold text-ink mb-1.5">学年・時期</label>
          <select id="inputGrade" required class="w-full bg-cardBg border border-kraft rounded-xl px-3 py-2.5 text-sm text-ink focus:outline-none focus:border-sage">
            <option value="preschool">小学校前</option>
            <option value="g1">小学1年生</option>
            <option value="g2">小学2年生</option>
            <option value="g3">小学3年生</option>
            <option value="g4">小学4年生</option>
            <option value="g5">小学5年生</option>
            <option value="g6">小学6年生</option>
          </select>
        </div>
      </div>

      <div>
        <label class="block text-xs font-bold text-ink mb-1.5">カテゴリー</label>
        <div class="grid grid-cols-3 gap-2">
          <label class="border border-kraft rounded-xl p-2.5 flex flex-col items-center gap-1 bg-white cursor-pointer [&:has(input:checked)]:border-sage [&:has(input:checked)]:bg-sage/5">
            <input type="radio" name="inputCategory" value="art" checked class="accent-sage hidden" />
            <span class="text-xl">🎨</span><span class="text-[11px] font-bold text-ink">絵・工作</span>
          </label>
          <label class="border border-kraft rounded-xl p-2.5 flex flex-col items-center gap-1 bg-white cursor-pointer [&:has(input:checked)]:border-sage [&:has(input:checked)]:bg-sage/5">
            <input type="radio" name="inputCategory" value="study" class="accent-sage hidden" />
            <span class="text-xl">📝</span><span class="text-[11px] font-bold text-ink">テスト・プリント</span>
          </label>
          <label class="border border-kraft rounded-xl p-2.5 flex flex-col items-center gap-1 bg-white cursor-pointer [&:has(input:checked)]:border-sage [&:has(input:checked)]:bg-sage/5">
            <input type="radio" name="inputCategory" value="other" class="accent-sage hidden" />
            <span class="text-xl">🌟</span><span class="text-[11px] font-bold text-ink">その他</span>
          </label>
        </div>
      </div>

      <div>
        <div class="flex justify-between items-center mb-1.5">
          <label class="block text-xs font-bold text-ink">メモ・エピソード</label>
          <span class="text-[10px] text-muted" id="memoCount">0 / 140</span>
        </div>
        <textarea id="inputMemo" maxlength="140" rows="3" placeholder="こどもの一言や、がんばっていたエピソードなど" class="w-full bg-cardBg border border-kraft rounded-xl p-3 text-sm text-ink focus:outline-none focus:border-sage placeholder-muted/50 resize-none"></textarea>
      </div>

      <button type="submit" id="workSubmitBtn" class="w-full btn-bounce bg-coral text-white rounded-xl py-3 font-bold text-sm shadow-md mt-2">保存する</button>
    </form>
  </div>

  <div id="childDrawer" class="drawer fixed bottom-0 left-0 right-0 max-w-md mx-auto bg-ivory rounded-t-[2.5rem] shadow-2xl z-50 px-5 pt-4 pb-8 border-t border-kraft/40 max-h-[85vh] overflow-y-auto">
    <div class="w-12 h-1.5 bg-kraft/60 rounded-full mx-auto mb-5"></div>
    <div class="flex items-center justify-between mb-4">
      <h2 class="text-lg font-bold text-ink">👦 こどもの設定・管理</h2>
      <button onclick="closeDrawer('child')" class="text-muted p-1 text-sm font-semibold">とじる</button>
    </div>

    <form id="childForm" onsubmit="handleChildSubmit(event)" class="bg-cardBg border border-kraft/60 rounded-2xl p-4 space-y-3.5 mb-5 shadow-sm">
      <h3 id="childFormSubTitle" class="text-xs font-bold text-sage uppercase tracking-wider">🌱 新しいこどもを追加</h3>
      <input type="hidden" id="editingChildId" value="" />
      <div class="grid grid-cols-2 gap-2.5">
        <div>
          <label class="block text-[11px] font-bold text-ink mb-1">お名前・ニックネーム</label>
          <input type="text" id="childName" required placeholder="たろう" class="w-full bg-ivory border border-kraft/50 rounded-xl px-3 py-2 text-xs text-ink focus:outline-none focus:border-sage" />
        </div>
        <div>
          <label class="block text-[11px] font-bold text-ink mb-1">生年月日</label>
          <input type="date" id="childBirthday" required class="w-full bg-ivory border border-kraft/50 rounded-xl px-3 py-2 text-xs text-ink focus:outline-none focus:border-sage" />
        </div>
      </div>
      <div class="flex gap-2">
        <button type="submit" id="childSubmitBtn" class="flex-1 btn-bounce bg-sage text-white rounded-xl py-2 text-xs font-bold shadow-sm">追加する</button>
        <button type="button" id="childCancelEditBtn" onclick="cancelChildEdit()" class="hidden btn-bounce bg-white border border-kraft text-muted rounded-xl py-2 px-3 text-xs font-medium">キャンセル</button>
      </div>
    </form>

    <div>
      <h4 class="text-xs font-bold text-ink mb-2">登録されているこども</h4>
      <div id="childManagerList" class="space-y-2">
        </div>
    </div>
  </div>

  <div id="detailModal" class="detail-modal fixed inset-x-4 top-[8vh] max-w-md mx-auto bg-ivory border border-kraft/50 rounded-[2.5rem] shadow-2xl z-50 overflow-hidden flex flex-col max-h-[82vh]">
    <div class="p-4 border-b border-kraft/30 flex items-center justify-between bg-cardBg">
      <div class="flex items-center gap-1.5">
        <span id="detailBadgeIcon" class="text-lg">🎨</span>
        <span id="detailBadgeText" class="text-xs font-bold bg-kraft/40 text-ink px-2.5 py-0.5 rounded-full">絵・工作</span>
      </div>
      <div class="flex items-center gap-2">
        <button onclick="triggerEditFromDetail()" class="text-sage font-bold text-xs px-2.5 py-1 bg-sage/10 rounded-lg">✏️ 編集</button>
        <button onclick="triggerDeleteFromDetail()" class="text-coral font-bold text-xs px-2.5 py-1 bg-coral/10 rounded-lg">🗑️ 削除</button>
        <button onclick="closeDetailModal()" class="text-muted text-xl font-bold p-1 ml-1">✕</button>
      </div>
    </div>

    <div class="flex-1 overflow-y-auto">
      <div class="bg-ink/5 w-full flex items-center justify-between border-b border-kraft/30 overflow-hidden min-h-[220px] max-h-[340px] relative">
        <img id="detailImage" class="w-full object-contain max-h-[340px]" src="" alt="Detail" />
        <video id="detailVideo" class="hidden w-full max-h-[340px]" controls></video>
      </div>

      <div class="p-5 space-y-4">
        <div>
          <span id="detailChildTag" class="text-[10px] font-bold text-white bg-sage px-2 py-0.5 rounded-md">たろう</span>
          <h3 id="detailTitle" class="text-xl font-bold text-ink mt-1.5 leading-snug">無題の作品</h3>
          <div class="flex items-center gap-2 text-xs text-muted mt-1 font-medium">
            <span id="detailDate">2026年01月01日</span>
            <span>•</span>
            <span id="detailGrade">小学1年生</span>
          </div>
        </div>

        <div id="detailMemoContainer" class="bg-cardBg border border-kraft/50 rounded-2xl p-4 notebook-line shadow-sm">
          <p id="detailMemo" class="text-sm text-ink leading-8 whitespace-pre-wrap pt-1 font-medium"></p>
        </div>

        <div class="border-t border-kraft/30 pt-4 space-y-4">
          <div>
            <p class="text-[11px] font-bold text-muted mb-2 uppercase tracking-wider">家族のスタンプ</p>
            <div class="flex gap-2.5">
              <button onclick="handleStampClick('heart')" class="btn-bounce bg-white border border-kraft/60 hover:border-coral rounded-xl px-3 py-1.5 flex items-center gap-1.5 shadow-sm text-sm">
                <span>❤️</span><span id="stamp-heart-count" class="font-bold text-xs text-ink">0</span>
              </button>
              <button onclick="handleStampClick('clap')" class="btn-bounce bg-white border border-kraft/60 hover:border-coral rounded-xl px-3 py-1.5 flex items-center gap-1.5 shadow-sm text-sm">
                <span>👏</span><span id="stamp-clap-count" class="font-bold text-xs text-ink">0</span>
              </button>
              <button onclick="handleStampClick('star')" class="btn-bounce bg-white border border-kraft/60 hover:border-coral rounded-xl px-3 py-1.5 flex items-center gap-1.5 shadow-sm text-sm">
                <span>👑</span><span id="stamp-star-count" class="font-bold text-xs text-ink">0</span>
              </button>
            </div>
          </div>

          <div>
            <p class="text-[11px] font-bold text-muted mb-2 uppercase tracking-wider">コメント</p>
            <div id="commentBoard" class="space-y-2 max-h-40 overflow-y-auto mb-3 pr-1 text-xs">
              </div>
            <div class="flex gap-2">
              <input type="text" id="commentInput" placeholder="すごいね！などメッセージを入力..." class="flex-1 bg-white border border-kraft/60 rounded-xl px-3 py-2 text-xs text-ink focus:outline-none focus:border-sage shadow-sm" />
              <button onclick="submitComment()" class="btn-bounce bg-sage text-white font-bold rounded-xl px-3 text-xs shadow-sm whitespace-nowrap">送信</button>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div id="toast" class="toast fixed bottom-24 left-1/2 bg-ink/90 backdrop-blur-sm text-white px-5 py-2.5 rounded-full text-xs font-semibold shadow-xl z-50 whitespace-nowrap pointer-events-none">通知</div>


  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { 
      getAuth, 
      signInWithPopup, 
      GoogleAuthProvider, 
      signOut, 
      onAuthStateChanged 
    } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { 
      getFirestore, 
      doc, 
      collection, 
      onSnapshot, 
      setDoc, 
      addDoc, 
      deleteDoc, 
      updateDoc,
      arrayUnion,
      increment
    } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    // ユーザー様からいただいた大切な本物のFirebase Configオブジェクト
    const firebaseConfig = {
      apiKey: "AIzaSyDW3BubqXf460RF6NxVr2rsFurcI75VHCg",
      authDomain: "kodomonote-9a8e1.firebaseapp.com",
      projectId: "kodomonote-9a8e1",
      storageBucket: "kodomonote-9a8e1.firebasestorage.app",
      messagingSenderId: "486206364077",
      appId: "1:486206364077:web:49dddbd7342973cc90a924"
    };

    // Firebase初期化
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    const provider = new GoogleAuthProvider();

    // アプリケーションの状態管理オブジェクト
    let currentUser = null;
    let unsubscribeWorks = null;
    let unsubscribeChildren = null;

    // Firestoreリアルタイム同期セットアップ
    function setupFirestoreSync(uid) {
      const familyId = uid; // 認証されたユーザーのUIDをベースにした家族ルーム
      
      // 子供達データの監視
      const childRef = collection(db, "families", familyId, "children");
      unsubscribeChildren = onSnapshot(childRef, (snapshot) => {
        const loadedChildren = [];
        snapshot.forEach(doc => {
          loadedChildren.push({ id: doc.id, ...doc.data() });
        });
        
        // 紐付けデータがない場合は初期値をクラウドに作成
        if (loadedChildren.length === 0) {
          const defaultChild = { name: 'たろう', birthday: '2020-04-01' };
          addDoc(childRef, defaultChild);
        } else {
          localChildren = loadedChildren;
          refreshChildControls();
        }
      }, err => console.error(err));

      // 作品データの監視
      const worksRef = collection(db, "families", familyId, "artworks");
      unsubscribeWorks = onSnapshot(worksRef, (snapshot) => {
        const loadedWorks = [];
        snapshot.forEach(doc => {
          loadedWorks.push({ id: doc.id, ...doc.data() });
        });
        localWorks = loadedWorks;
        renderCards();
        
        // 詳細画面が開いている場合は中身をリアルタイムアップデート
        if (activeDetailId) {
          const updatedWork = localWorks.find(w => w.id === activeDetailId);
          if (updatedWork) updateDetailModalContent(updatedWork);
        }
      }, err => console.error(err));
    }

    // ─── 画像処理・自動スキャンロジック (OpenCV.js) ──────────────────────
    window.handleFileSelect = function(e) {
      const file = e.target.files[0];
      if (!file) return;

      selectedMediaType = file.type.startsWith('video/') ? 'video' : 'image';
      
      const reader = new FileReader();
      reader.onload = function(evt) {
        const dataUrl = evt.target.result;
        
        if (selectedMediaType === 'video') {
          selectedMediaBase64 = dataUrl;
          showMediaPreview(dataUrl, 'video');
        } else {
          // 画像処理（自動スキャン）の実行
          processImageScan(dataUrl);
        }
      };
      reader.readAsDataURL(file);
    };

    function processImageScan(srcDataUrl) {
      document.getElementById('mediaPlaceholder').classList.add('hidden');
      document.getElementById('mediaResultContainer').classList.remove('hidden');
      document.getElementById('scanOverlay').classList.remove('hidden');
      
      const img = new Image();
      img.onload = function() {
        // 画像のリサイズ圧縮（Max 800px）
        const maxDim = 800;
        let w = img.width;
        let h = img.height;
        if (w > maxDim || h > maxDim) {
          if (w > h) { h = Math.round((h * maxDim) / w); w = maxDim; }
          else { w = Math.round((w * maxDim) / h); h = maxDim; }
        }
        const canvas = document.createElement('canvas');
        canvas.width = w;
        canvas.height = h;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(img, 0, 0, w, h);

        // OpenCV.js が起動していない場合はスキャンをスキップして圧縮版を採用
        if (!window.cvReady || !window.cv || !cv.Mat) {
          console.log("OpenCV not ready. Skipping adaptive scan edge crop.");
          selectedMediaBase64 = canvas.toDataURL('image/jpeg', 0.85);
          showMediaPreview(selectedMediaBase64, 'image');
          document.getElementById('scanOverlay').classList.add('hidden');
          return;
        }

        // OpenCVを用いたエッジ輪郭検出・射影歪み自動補正
        setTimeout(() => {
          try {
            let src = cv.imread(canvas);
            let dst = new cv.Mat();
            cv.cvtColor(src, dst, cv.COLOR_RGBA2GRAY, 0);
            cv.GaussianBlur(dst, dst, new cv.Size(5, 5), 0, 0, cv.BORDER_DEFAULT);
            cv.Canny(dst, dst, 75, 200, 3, false);

            let contours = new cv. someContourList || new cv.MatVector();
            let hierarchy = new cv.Mat();
            cv.findContours(dst, contours, hierarchy, cv.RETR_EXTERNAL, cv.CHAIN_APPROX_SIMPLE);

            let maxArea = 0;
            let maxContourIndex = -1;
            for (let i = 0; i < contours.size(); ++i) {
              let area = cv.contourArea(contours.get(i));
              if (area > maxArea) { maxArea = area; maxContourIndex = i; }
            }

            let scannedDataUrl = null;
            // 一定以上の大きさの四角い輪郭が見つかった場合のみ補正
            if (maxContourIndex !== -1 && maxArea > (canvas.width * canvas.height * 0.15)) {
              let contour = contours.get(maxContourIndex);
              let approx = new cv.Mat();
              let peri = cv.arcLength(contour, true);
              cv.approxPolyDP(contour, approx, 0.02 * peri, true);

              if (approx.rows === 4) {
                // 4つの角を整列させて射影変換を実行
                let pts = [];
                for (let i = 0; i < 4; i++) {
                  pts.push({ x: approx.data32S[i * 2], y: approx.data32S[i * 2 + 1] });
                }
                
                pts.sort((a, b) => a.x - b.x);
                let leftToRight = pts;
                let topLeft = leftToRight[0].y < leftToRight[1].y ? leftToRight[0] : leftToRight[1];
                let bottomLeft = leftToRight[0].y > leftToRight[1].y ? leftToRight[0] : leftToRight[1];
                let topRight = leftToRight[2].y < leftToRight[3].y ? leftToRight[2] : leftToRight[3];
                let bottomRight = leftToRight[2].y > leftToRight[3].y ? leftToRight[2] : leftToRight[3];

                let wA = Math.sqrt(Math.pow(bottomRight.x - bottomLeft.x, 2) + Math.pow(bottomRight.y - bottomLeft.y, 2));
                let wB = Math.sqrt(Math.pow(topRight.x - topLeft.x, 2) + Math.pow(topRight.y - topLeft.y, 2));
                let maxWidth = Math.max(wA, wB);

                let hA = Math.sqrt(Math.pow(topRight.x - bottomRight.x, 2) + Math.pow(topRight.y - bottomRight.y, 2));
                let hB = Math.sqrt(Math.pow(topLeft.x - bottomLeft.x, 2) + Math.pow(topLeft.y - bottomLeft.y, 2));
                let maxHeight = Math.max(hA, hB);

                let srcTri = cv.matFromArray(4, 1, cv.CV_32FC2, [topLeft.x, topLeft.y, topRight.x, topRight.y, bottomRight.x, bottomRight.y, bottomLeft.x, bottomLeft.y]);
                let dstTri = cv.matFromArray(4, 1, cv.CV_32FC2, [0, 0, maxWidth, 0, maxWidth, maxHeight, 0, maxHeight]);
                let M = cv.getPerspectiveTransform(srcTri, dstTri);
                
                let transformed = new cv.Mat();
                let dsize = new cv.Size(maxWidth, maxHeight);
                cv.warpPerspective(src, transformed, M, dsize, cv.INTER_LINEAR, cv.BORDER_CONSTANT, new cv.Scalar());

                let resultCanvas = document.createElement('canvas');
                cv.imshow(resultCanvas, transformed);
                scannedDataUrl = resultCanvas.toDataURL('image/jpeg', 0.85);

                srcTri.delete(); dstTri.delete(); M.delete(); transformed.delete(); approx.delete();
              } else { approx.delete(); }
            }

            // メモリ解放
            src.delete(); dst.delete(); contours.delete(); hierarchy.delete();

            selectedMediaBase64 = scannedDataUrl ? scannedDataUrl : canvas.toDataURL('image/jpeg', 0.85);
            showMediaPreview(selectedMediaBase64, 'image');
            if(scannedDataUrl) showToast("書類を自動スキャン補正しました✨");

          } catch (err) {
            console.error("OpenCV processing issue:", err);
            selectedMediaBase64 = canvas.toDataURL('image/jpeg', 0.85);
            showMediaPreview(selectedMediaBase64, 'image');
          } finally {
            document.getElementById('scanOverlay').classList.add('hidden');
          }
        }, 60);
      };
      img.src = srcDataUrl;
    }

    // ─── 作品（きろく）のデータ操作 ─────────────────────────────────
    window.handleWorkSubmit = async function(e) {
      e.preventDefault();
      
      const editingId = document.getElementById('editingWorkId').value;
      const title = document.getElementById('inputTitle').value.trim();
      const childId = document.getElementById('inputWorkChild').value;
      const date = document.getElementById('inputDate').value;
      const grade = document.getElementById('inputGrade').value;
      const category = document.querySelector('input[name="inputCategory"]:checked').value;
      const memo = document.getElementById('inputMemo').value.trim();

      if (!selectedMediaBase64 && !editingId) {
        alert("写真または動画を選択してください");
        return;
      }

      const childObj = localChildren.find(c => c.id === childId);
      const childName = childObj ? childObj.name : '不明';

      if (currentUser) {
        // クラウド保存 (Firestore)
        const familyId = currentUser.uid;
        const worksRef = collection(db, "families", familyId, "artworks");

        const dataPayload = {
          title, childId, childName, date, grade, category, memo,
          updatedAt: Date.now()
        };
        if (selectedMediaBase64) {
          dataPayload.media = selectedMediaBase64;
          dataPayload.mediaType = selectedMediaType;
        }

        try {
          if (editingId) {
            await updateDoc(doc(db, "families", familyId, "artworks", editingId), dataPayload);
            showToast("おもいでを更新しました✏️");
          } else {
            dataPayload.createdAt = Date.now();
            dataPayload.likes = { heart: 0, clap: 0, star: 0 };
            dataPayload.comments = [];
            await addDoc(worksRef, dataPayload);
            showToast("おもいでをクラウドにきろくしました！✨");
          }
        } catch(err) {
          console.error(err);
          showToast("保存に失敗しました");
        }
      } else {
        // ローカル保存 (LocalStorage)
        if (editingId) {
          localWorks = localWorks.map(w => {
            if (w.id === editingId) {
              const updated = { ...w, title, childId, childName, date, grade, category, memo };
              if (selectedMediaBase64) {
                updated.media = selectedMediaBase64;
                updated.mediaType = selectedMediaType;
              }
              return updated;
            }
            return w;
          });
          showToast("おもいでを更新しました(ローカル)");
        } else {
          const newWork = {
            id: 'work-' + Date.now(),
            title, childId, childName, date, grade, category, memo,
            media: selectedMediaBase64,
            mediaType: selectedMediaType,
            createdAt: Date.now(),
            likes: { heart: 0, clap: 0, star: 0 },
            comments: []
          };
          localWorks.push(newWork);
          showToast("おもいでをブラウザに保存しました！");
        }
        localStorage.setItem('kodomonote_works', JSON.stringify(localWorks));
        renderCards();
      }

      closeDrawer('work');
      // 更新後の同期モーダル反映
      if (editingId && activeDetailId === editingId) {
        const up = localWorks.find(w => w.id === editingId);
        if(up) updateDetailModalContent(up);
      }
    };

    window.handleStampClick = async function(type) {
      if(!activeDetailId) return;
      
      if (currentUser) {
        const itemRef = doc(db, "families", currentUser.uid, "artworks", activeDetailId);
        const updateField = {};
        updateField[`likes.${type}`] = increment(1);
        await updateDoc(itemRef, updateField);
      } else {
        localWorks = localWorks.map(w => {
          if (w.id === activeDetailId) {

          return w;

    function renderCards() {
      const grid = document.getElementById('galleryGrid');
      const empty = document.getElementById('emptyState');
      grid.innerHTML = "";

      const query = document.getElementById('searchBar').value.toLowerCase().trim();
      const gradeSel = document.getElementById('gradeFilter').value;

      // フィルタリング処理
      let filtered = localWorks.filter(w => {
        if (currentChildFilter !== 'all' && w.childId !== currentChildFilter) return false;
        if (currentCategoryFilter !== 'all' && w.category !== currentCategoryFilter) return false;
        if (gradeSel !== 'all' && w.grade !== gradeSel) return false;
        if (query) {
          const matchTitle = w.title && w.title.toLowerCase().includes(query);
          const matchMemo = w.memo && w.memo.toLowerCase().includes(query);
          if(!matchTitle && !matchMemo) return false;
        }
        return true;
      });

      // 並び替え処理
      filtered.sort((a, b) => {
        const dateA = new Date(a.date || 0).getTime();
        const dateB = new Date(b.date || 0).getTime();
        return currentSortOrder === 'new' ? dateB - dateA : dateA - dateB;
      });

      if (filtered.length === 0) {
        grid.classList.add('hidden');
        empty.classList.remove('hidden');
        return;
      }

      grid.classList.remove('hidden');
      empty.classList.add('hidden');

      filtered.forEach(item => {
        const card = document.createElement('div');
        card.className = "btn-bounce bg-cardBg border border-kraft/70 rounded-2xl overflow-hidden shadow-sm flex flex-col cursor-pointer";
        card.onclick = () => openDetailModal(item.id);

        const badgeText = { art: '絵・工作', study: 'テスト・プリント', other: 'その他' }[item.category] || '📂';
        const mediaHtml = item.mediaType === 'video' 
          ? `<div class="w-full aspect-square bg-ink/5 flex items-center justify-center relative"><video src="${item.media}" class="w-full h-full object-cover"></video><span class="absolute bottom-2 right-2 bg-ink/60 text-white text-[10px] px-1.5 py-0.5 rounded">▶ 動画</span></div>`
          : `<img src="${item.media}" class="w-full aspect-square object-cover" alt="Thumb" />`;

        card.innerHTML = `
          ${mediaHtml}
          <div class="p-3 flex-1 flex flex-col justify-between">
            <div>
              <div class="flex items-center gap-1 mb-1">
                <span class="text-[9px] font-bold text-white bg-sage px-1.5 py-0.2 rounded">${escHtml(item.childName)}</span>
                <span class="text-[9px] text-muted truncate font-medium">${formatGrade(item.grade)}</span>
              </div>
              <h3 class="text-xs font-bold text-ink line-clamp-2 leading-tight">${escHtml(item.title)}</h3>
            </div>
            <div class="flex items-center justify-between mt-2 pt-1.5 border-t border-kraft/30 text-[10px] text-muted font-medium">
              <span>${formatDateSimple(item.date)}</span>
              <div class="flex items-center gap-1.5">
                <span>❤️ ${item.likes?.heart || 0}</span>
                <span>💬 ${item.comments?.length || 0}</span>
              </div>
            </div>
          </div>
        `;
        grid.appendChild(card);
      });
    }

    function renderChildTabs() {

      localChildren.forEach(child => {
        const tab = document.createElement('button');
        tab.id = `tab-${child.id}`;
        tab.onclick = () => setChildFilter(child.id);
        tab.className = `child-tab btn-bounce bg-white border border-kraft text-ink rounded-xl px-4 py-1.5 text-xs font-bold shadow-sm whitespace-nowrap ${currentChildFilter === child.id ? 'active' : ''}`;
        tab.textContent = child.name;
        container.appendChild(tab);
      });
    }

    function populateChildSelectOptions() {
      const select = document.getElementById('inputWorkChild');
      select.innerHTML = "";
      localChildren.forEach(child => {
        const opt = document.createElement('option');
        opt.value = child.id;
        opt.textContent = child.name;
        select.appendChild(opt);
      });

      // 設定内の管理一覧リストもついでにレンダリング
      const managerList = document.getElementById('childManagerList');
      managerList.innerHTML = "";
      localChildren.forEach(child => {
        const ageStr = calculateAgeStr(child.birthday);
        const item = document.createElement('div');
        item.className = "flex items-center justify-between p-3 bg-white border border-kraft/40 rounded-xl shadow-sm text-xs";
        item.innerHTML = `
          <div>
            <p class="font-bold text-ink">${escHtml(child.name)}</p>
            <p class="text-[10px] text-muted mt-0.5">${formatDate(child.birthday)}生まれ (${ageStr})</p>
          </div>
          <div class="flex items-center gap-2">
            <button onclick="startChildEdit('${child.id}')" class="text-sage font-bold p-1">修正</button>
            <button onclick="deleteChildProfile('${child.id}')" class="text-coral font-bold p-1">削除</button>
          </div>
        `;
        managerList.appendChild(item);
      });
    }

    // ─── モーダル・ディテール画面制御 ──────────────────────────────
    window.openDetailModal = function(id) {
      activeDetailId = id;
      const target = localWorks.find(w => w.id === id);
      if(!target) return;

      updateDetailModalContent(target);

      document.getElementById('modalBackdrop').classList.add('open');
      document.getElementById('detailModal').classList.add('open');
      document.body.style.overflow = 'hidden';
    };

    function updateDetailModalContent(work) {
      const catName = { art: '絵・工作', study: 'テスト・プリント', other: 'その他' }[work.category] || '📂';
      const catIcon = { art: '🎨', study: '📝', other: '🌟' }[work.category] || '📂';
      
      document.getElementById('detailBadgeIcon').textContent = catIcon;
      document.getElementById('detailBadgeText').textContent = catName;
      document.getElementById('detailChildTag').textContent = work.childName;
      document.getElementById('detailTitle').textContent = work.title;
      document.getElementById('detailDate').textContent = formatDate(work.date);
      document.getElementById('detailGrade').textContent = formatGrade(work.grade);
      
      // メモ表示
      if(work.memo) {
        document.getElementById('detailMemoContainer').classList.remove('hidden');
        document.getElementById('detailMemo').textContent = work.memo;
      } else {
        document.getElementById('detailMemoContainer').classList.add('hidden');
      }

      // メディア表示
      const imgEl = document.getElementById('detailImage');
      const vidEl = document.getElementById('detailVideo');
      if (work.mediaType === 'video') {
        imgEl.classList.add('hidden');
        vidEl.classList.remove('hidden');
        vidEl.src = work.media;
      } else {
        vidEl.classList.add('hidden');
        imgEl.classList.remove('hidden');
        imgEl.src = work.media;
      }

      // スタンプ反映
      document.getElementById('stamp-heart-count').textContent = work.likes?.heart || 0;
      document.getElementById('stamp-clap-count').textContent = work.likes?.clap || 0;
      document.getElementById('stamp-star-count').textContent = work.likes?.star || 0;

      // コメント反映
      const board = document.getElementById('commentBoard');
      board.innerHTML = "";
      const comms = work.comments || [];
      if(comms.length === 0) {
        board.innerHTML = `<p class="text-muted italic text-[11px] py-1 text-center">まだコメントはありません🌱</p>`;
      } else {
        comms.forEach(c => {
          const row = document.createElement('div');
          row.className = "bg-white p-2 border border-kraft/30 rounded-xl shadow-sm";
          row.innerHTML = `
            <div class="flex justify-between text-[10px] text-muted mb-0.5">
              <span class="font-bold text-sage">${escHtml(c.author)}</span>
              <span>${formatDateTime(c.createdAt)}</span>
            </div>
            <p class="text-ink font-medium leading-tight">${escHtml(c.text)}</p>
          `;
          board.appendChild(row);
        });
        setTimeout(() => board.scrollTop = board.scrollHeight, 50);
      }
    }

    window.closeDetailModal = function() {
      activeDetailId = null;
      document.getElementById('detailModal').classList.remove('open');
      if(!document.getElementById('workDrawer').classList.contains('open') && !document.getElementById('childDrawer').classList.contains('open')) {
        document.getElementById('modalBackdrop').classList.remove('open');
        document.body.style.overflow = '';
      }
    };

    window.triggerEditFromDetail = function() {
      const id = activeDetailId;
      closeDetailModal();
      setTimeout(() => {
        const target = localWorks.find(w => w.id === id);
        if(!target) return;

        openDrawer('work');
        document.getElementById('workDrawerTitle').textContent = "✏️ おもいでを修正";
        document.getElementById('editingWorkId').value = target.id;
        document.getElementById('inputTitle').value = target.title;
        document.getElementById('inputWorkChild').value = target.childId;
        document.getElementById('inputDate').value = target.date;
        document.getElementById('inputGrade').value = target.grade;
        document.getElementById('inputMemo').value = target.memo || "";
        document.getElementById('workSubmitBtn').textContent = "変更を保存する";
        
        // 既存メディアのプレビュー表示
        selectedMediaBase64 = target.media;
        selectedMediaType = target.mediaType || 'image';
        showMediaPreview(target.media, selectedMediaType);
        document.getElementById('memoCount').textContent = `${target.memo?.length || 0} / 140`;

        const radios = document.querySelectorAll('input[name="inputCategory"]');
        radios.forEach(r => { if(r.value === target.category) r.checked = true; });
      }, 350);
    };

    window.triggerDeleteFromDetail = async function() {
      if(!activeDetailId) return;
      if(!confirm("このおもいでデータを完全に削除しますか？")) return;

      const id = activeDetailId;
      closeDetailModal();

      if (currentUser) {
        await deleteDoc(doc(db, "families", currentUser.uid, "artworks", id));
        showToast("おもいでを削除しました");
      } else {
        localWorks = localWorks.filter(w => w.id !== id);
        localStorage.setItem('kodomonote_works', JSON.stringify(localWorks));
        renderCards();
        showToast("おもいでを削除しました(ローカル)");
      }
    };

    // ─── ドロワー表示制御 ──────────────────────────────────────────
    window.openDrawer = function(type) {
      document.getElementById('modalBackdrop').classList.add('open');
      document.body.style.overflow = 'hidden';
      
      if(type === 'work') {
        document.getElementById('workDrawer').classList.add('open');
        // 新規登録モードとしてリセット
        if(!document.getElementById('editingWorkId').value) {
          document.getElementById('workForm').reset();
          document.getElementById('workDrawerTitle').textContent = "🎨 おもいでをきろく";
          document.getElementById('workSubmitBtn').textContent = "保存する";
          document.getElementById('inputDate').value = new Date().toISOString().split('T')[0];
          clearMediaSelection();
        }
      } else {
        document.getElementById('childDrawer').classList.add('open');
        cancelChildEdit();
      }
    };

    window.closeDrawer = function(type) {
      if(type === 'work') {
        document.getElementById('workDrawer').classList.remove('open');
        setTimeout(() => { document.getElementById('editingWorkId').value = ""; }, 400);
      } else {
        document.getElementById('childDrawer').classList.remove('open');
      }
      
      if(!document.getElementById('detailModal').classList.contains('open')) {
        document.getElementById('modalBackdrop').classList.remove('open');
        document.body.style.overflow = '';
      }
    };

    window.closeAllPanels = function() {
      closeDrawer('work');
      closeDrawer('child');
      closeDetailModal();
    };

    // ─── 汎用共通ユーティリティ関数 ───────────────────────────────────
    function escHtml(str) {
      return String(str).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
    }

    function formatDate(str) {
      if (!str) return '';
      const parts = str.split('-');
      if (parts.length < 3) return str;
      return `${parts[0]}年${parseInt(parts[1])}月${parseInt(parts[2])}日`;
    }

    function formatDateSimple(str) {
      if (!str) return '';
      const parts = str.split('-');
      if (parts.length < 3) return str;
      return `${parseInt(parts[1])}/${parseInt(parts[2])}`;
    }

    function formatGrade(code) {
      return { preschool: '小学校前', g1: '小学1年生', g2: '小学2年生', g3: '小学3年生', g4: '小学4年生', g5: '小学5年生', g6: '小学6年生' }[code] || code;
    }

    function formatDateTime(ts) {
      if (!ts) return '';
      const d = new Date(ts);
      return `${d.getFullYear()}年${d.getMonth()+1}月${d.getDate()}日 ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
    }

    function calculateAgeStr(bdStr) {
      if(!bdStr) return '';
      const bd = new Date(bdStr);
      const today = new Date();
      let age = today.getFullYear() - bd.getFullYear();
      let m = today.getMonth() - bd.getMonth();
      if (m < 0 || (m === 0 && today.getDate() < bd.getDate())) { age--; m = 12 + m; }
      if(age < 0) return '0さい';
      return age > 0 ? `${age}さい` : `${m}ヶ月`;
    }

    let toastTimer = null;
    function showToast(msg) {
      const el = document.getElementById('toast');
      el.textContent = msg;
      el.classList.add('show');
      if (toastTimer) clearTimeout(toastTimer);
      toastTimer = setTimeout(() => el.classList.remove('show'), 2200);
    }

    document.getElementById('inputMemo').addEventListener('input', function() {
      document.getElementById('memoCount').textContent = `${this.value.length} / 140`;
    });

    // 初回アプリ画面初期化
    refreshAppView();
  </script>
</body>
</html>
