<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>コドomonote Premium</title>

<script src="https://cdn.tailwindcss.com"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<style>
:root{
  --bg:#F7F4EE;
  --card:#FFFFFF;
  --ink:#1E293B;
  --muted:#64748B;
  --accent:#7C9A92;
  --accent-dark:#56736C;
  --gold:#D6B25E;
  --border:#E7E1D7;
  --danger:#D66A5E;
}

*{
  box-sizing:border-box;
  -webkit-tap-highlight-color:transparent;
}

html,body{
  margin:0;
  padding:0;
  background:var(--bg);
  color:var(--ink);
  font-family:'Noto Sans JP',sans-serif;
}

button{
  cursor:pointer;
}

input,select,textarea{
  width:100%;
  border:1px solid var(--border);
  border-radius:16px;
  padding:14px 16px;
  background:white;
  outline:none;
}

input:focus,
select:focus,
textarea:focus{
  border-color:var(--accent);
  box-shadow:0 0 0 4px rgba(124,154,146,.12);
}

.hidden{
  display:none !important;
}

.page{
  display:none;
}

.page.active{
  display:block;
}

.glass{
  backdrop-filter:blur(24px);
  background:rgba(255,255,255,.78);
}

.premium-card{
  background:var(--card);
  border:1px solid var(--border);
  border-radius:24px;
  box-shadow:
    0 8px 24px rgba(15,23,42,.04),
    0 1px 2px rgba(15,23,42,.03);
}

.gallery-card{
  overflow:hidden;
  transition:.25s cubic-bezier(.16,1,.3,1);
}

.gallery-card:active{
  transform:scale(.985);
}

.bottom-nav{
  position:fixed;
  left:0;
  right:0;
  bottom:0;
  height:84px;
  z-index:200;
  background:rgba(255,255,255,.92);
  backdrop-filter:blur(30px);
  border-top:1px solid var(--border);
}

.nav-tab{
  color:#94A3B8;
  transition:.25s;
}

.nav-tab.active{
  color:var(--accent-dark);
  font-weight:700;
}

.fab{
  width:68px;
  height:68px;
  border:none;
  border-radius:50%;
  color:white;
  font-size:34px;
  background:linear-gradient(
    135deg,
    var(--accent),
    var(--accent-dark)
  );
  box-shadow:0 12px 24px rgba(86,115,108,.28);
}

.drawer{
  position:fixed;
  inset:0;
  display:flex;
  align-items:flex-end;
  justify-content:center;
  background:rgba(0,0,0,.4);
  z-index:500;
  opacity:0;
  pointer-events:none;
  transition:.35s;
}

.drawer.open{
  opacity:1;
  pointer-events:auto;
}

.drawer-panel{
  width:min(760px,100%);
  max-height:92vh;
  overflow:auto;
  background:white;
  border-radius:32px 32px 0 0;
  padding:28px;
  box-shadow:0 -20px 60px rgba(0,0,0,.15);
  transform:translateY(60px);
  transition:.35s;
}

.drawer.open .drawer-panel{
  transform:translateY(0);
}

.modal{
  position:fixed;
  inset:0;
  display:flex;
  align-items:center;
  justify-content:center;
  background:rgba(0,0,0,.7);
  z-index:700;
  opacity:0;
  pointer-events:none;
  transition:.25s;
}

.modal.open{
  opacity:1;
  pointer-events:auto;
}

.modal-card{
  width:min(920px,96%);
  max-height:95vh;
  overflow:auto;
  background:white;
  border-radius:28px;
}

.wheel-container{
  position:relative;
  height:220px;
  overflow-y:auto;
  scroll-snap-type:y mandatory;
  border-radius:24px;
  background:white;
  border:1px solid var(--border);
  -ms-overflow-style:none;
  scrollbar-width:none;
}

.wheel-container::-webkit-scrollbar{
  display:none;
}

.wheel-item{
  height:44px;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:20px;
  color:#94A3B8;
  scroll-snap-align:center;
  transition:.18s;
}

.wheel-item.active{
  color:var(--accent-dark);
  font-size:28px;
  font-weight:700;
}

.wheel-highlight{
  position:absolute;
  top:88px;
  left:12px;
  right:12px;
  height:44px;
  border-radius:14px;
  background:rgba(124,154,146,.08);
  border:1px solid rgba(124,154,146,.18);
  pointer-events:none;
}

.toast{
  position:fixed;
  top:24px;
  left:50%;
  transform:translateX(-50%);
  background:#111827;
  color:white;
  padding:12px 18px;
  border-radius:999px;
  z-index:999;
  opacity:0;
  transition:.2s;
}

.toast.show{
  opacity:1;
}
</style>
</head>

<body>
<div id="toast" class="toast"></div>

<header class="sticky top-0 z-50 px-4 py-4 glass border-b border-[#E7E1D7]">
  <div class="max-w-7xl mx-auto flex justify-between items-center">
    <div>
      <div class="text-2xl font-bold tracking-tight">Kodomonote</div>
      <div id="environmentBadge" class="text-xs font-semibold mt-1 px-2 py-0.5 rounded-full inline-block bg-slate-100 text-slate-600">
        環境確認中...
      </div>
    </div>

    <div class="flex gap-3 items-center">
      <button id="authBtn" class="px-4 py-2 rounded-full bg-white border border-[#E7E1D7] text-sm shadow-sm">
        <span id="authBtnText">ログイン</span>
      </button>

      <button onclick="openDrawer('child')" class="w-11 h-11 rounded-full bg-white border border-[#E7E1D7] shadow-sm">
        ⚙
      </button>
    </div>
  </div>
</header>

<main class="max-w-7xl mx-auto px-4 pb-32">
  <section id="galleryPage" class="page active">
    <div class="pt-6 pb-4">
      <h2 class="text-3xl font-bold">Gallery</h2>
      <p class="text-sm text-slate-500 mt-1">子どもの作品を一覧表示</p>
    </div>
    <div id="galleryGrid" class="grid grid-cols-2 md:grid-cols-4 gap-5"></div>
  </section>

  <section id="recordsPage" class="page">
    <div class="pt-6 pb-4">
      <h2 class="text-3xl font-bold">Records</h2>
      <p class="text-sm text-slate-500 mt-1">タイムライン管理</p>
    </div>
    <div id="recordsTimeline" class="space-y-4"></div>
  </section>
</main>

<div class="bottom-nav flex justify-center items-center">
  <div class="w-full max-w-lg px-8 flex items-center justify-between">
    <button onclick="switchPage('gallery')" id="nav-gallery" class="nav-tab active flex flex-col items-center">
      <span class="text-lg">□</span>
      <span class="text-xs">Gallery</span>
    </button>

    <button onclick="openDrawer('work')" class="fab">+</button>

    <button onclick="switchPage('records')" id="nav-records" class="nav-tab flex flex-col items-center">
      <span class="text-lg">≡</span>
      <span class="text-xs">Records</span>
    </button>
  </div>
</div>

<div id="workDrawer" class="drawer">
  <div class="drawer-panel">
    <div class="flex justify-between items-center mb-6">
      <h3 class="text-2xl font-bold">作品登録</h3>
      <button onclick="closeDrawer('work')">✕</button>
    </div>

    <form id="workForm" class="space-y-5">
      <div>
        <label class="block text-sm font-semibold mb-2">タイトル</label>
        <input id="inputTitle"/>
      </div>

      <div>
        <label class="block text-sm font-semibold mb-2">子ども</label>
        <select id="inputWorkChild"></select>
      </div>

      <div>
        <label class="block text-sm font-semibold mb-2">日付</label>
        <input id="inputDate" type="date"/>
      </div>

      <div>
        <label class="block text-sm font-semibold mb-3">年齢</label>
        <div class="relative">
          <div class="wheel-highlight"></div>
          <div id="ageWheel" class="wheel-container"></div>
        </div>
      </div>

      <div>
        <label class="block text-sm font-semibold mb-2">メモ</label>
        <textarea id="inputMemo"></textarea>
      </div>

      <div>
        <input id="fileInput" type="file" multiple accept="image/*,video/*" class="hidden"/>
        <button type="button" onclick="document.getElementById('fileInput').click()" class="w-full py-4 rounded-2xl border border-dashed border-[#CBD5E1] bg-slate-50">
          メディアを追加（最大5）
        </button>
        <div id="mediaResultContainer" class="mt-4"></div>
      </div>

      <button type="submit" class="w-full py-4 rounded-2xl text-white font-semibold text-base" style="background:linear-gradient(135deg,#7C9A92,#56736C);box-shadow:0 14px 32px rgba(86,115,108,.25);">
        保存する
      </button>
    </form>
  </div>
</div>

<div id="childDrawer" class="drawer">
  <div class="drawer-panel">
    <div class="flex justify-between items-center mb-6">
      <h3 class="text-2xl font-bold">子ども設定</h3>
      <button onclick="closeDrawer('child')">✕</button>
    </div>

    <div class="space-y-4">
      <input id="childName" placeholder="名前"/>
      <input id="childBirthday" type="date"/>
      <button onclick="addChild()" class="w-full py-4 rounded-2xl text-white font-semibold" style="background:linear-gradient(135deg,#7C9A92,#56736C);">
        追加
      </button>
    </div>
    <div id="childList" class="mt-6"></div>
  </div>
</div>

<div id="detailModal" class="modal">
  <div class="modal-card relative">
    <button onclick="closeDetailModal()" class="absolute right-4 top-4 z-50 bg-white rounded-full w-10 h-10">✕</button>
    <div id="detailCarousel" class="relative w-full h-[420px] bg-black overflow-hidden"></div>

    <button onclick="prevMedia()" class="absolute left-4 top-[210px] z-10 w-10 h-10 rounded-full bg-white/80">‹</button>
    <button onclick="nextMedia()" class="absolute right-4 top-[210px] z-10 w-10 h-10 rounded-full bg-white/80">›</button>

    <div id="carouselDots" class="absolute top-[390px] left-0 right-0 flex justify-center gap-2 z-10"></div>

    <div class="p-6">
      <h3 id="detailTitle" class="text-2xl font-bold"></h3>
      <div id="detailMeta" class="text-slate-500 mt-2"></div>
      <p id="detailMemo" class="mt-4 whitespace-pre-wrap"></p>
    </div>
  </div>
</div>

<script type="module">
/* ==========================================================================
   🚨 スマホデバッグ用：エラー強制アラート監視システム
   ========================================================================== */
window.onerror = function(message, source, lineno, colno, error) {
  alert("🚨 JavaScriptエラー検知:\n" + message + "\n\n場所: " + source + "\n行: " + lineno + "列: " + colno);
  return false;
};
window.addEventListener('unhandledrejection', function(event) {
  alert("🔥 Firebase/非同期エラー検知:\n" + event.reason);
});

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
  getFirestore,
  collection,
  addDoc,
  getDocs,
  serverTimestamp
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
import {
  getStorage,
  ref,
  uploadString,
  getDownloadURL
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-storage.js";
import { 
  getAuth, 
  signInWithPopup, 
  GoogleAuthProvider, 
  signOut, 
  onAuthStateChanged 
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

/* ==========================================================================
   Firebase 環境自動分離設定（dev / stg / prod）
   ========================================================================== */
const firebaseConfigs = {
  dev: {
    apiKey: "AIzaSyDYm32a1LsUdEL5lENwhr5x6lxP9LMsBBw",
    authDomain: "kodomonote-dev.firebaseapp.com",
    projectId: "kodomonote-dev",
    storageBucket: "kodomonote-dev.firebasestorage.app",
    messagingSenderId: "96191159793",
    appId: "1:96191159793:web:bfcf868f0b57f0cc283850"
  },
  stg: {
    apiKey: "AIzaSyCzZ-_Pvsq0Hq5Y4cUwbTtwx931Fj3rHW0",
    authDomain: "kodomonote-stg.firebaseapp.com",
    projectId: "kodomonote-stg",
    storageBucket: "kodomonote-stg.firebasestorage.app",
    messagingSenderId: "541313224664",
    appId: "1:541313224664:web:51eb751a41fc605ff9acad"
  },
  prod: {
    apiKey: "AIzaSyAIIyoP8WvaDtHcsySKVj3UW1tXwWahBqk",
    authDomain: "kodomonote-prod.firebaseapp.com",
    projectId: "kodomonote-prod",
    storageBucket: "kodomonote-prod.firebasestorage.app",
    messagingSenderId: "538859578059",
    appId: "1:538859578059:web:f4984385a311f033b2f14e",
    measurementId: "G-CNRP0K05MD"
  }
};

function getFirebaseConfig(){
  const host = window.location.hostname;
  const badge = document.getElementById("environmentBadge");
  
  if(host === "localhost" || host === "127.0.0.1"){
    if(badge) { badge.innerText = "Local Dev"; badge.className = "text-xs font-semibold mt-1 px-2 py-0.5 rounded-full inline-block bg-emerald-100 text-emerald-700"; }
    return firebaseConfigs.dev;
  }
  if(host.includes("stg") || host.includes("staging")){
    if(badge) { badge.innerText = "Staging"; badge.className = "text-xs font-semibold mt-1 px-2 py-0.5 rounded-full inline-block bg-amber-100 text-amber-700"; }
    return firebaseConfigs.stg;
  }
  // GitHub Pages (p1369q.github.io) を含むその他すべてをProduction(本番)とする
  if(badge) { badge.innerText = "Production"; badge.className = "text-xs font-semibold mt-1 px-2 py-0.5 rounded-full inline-block bg-rose-100 text-rose-700"; }
  return firebaseConfigs.prod;
}

const app = initializeApp(getFirebaseConfig());
const db = getFirestore(app);
const storage = getStorage(app);
const auth = getAuth(app);
const provider = new GoogleAuthProvider();

/* ==========================================================================
   State & Session レイター
   ========================================================================== */
let currentSession = null;
let localChildren = [];
let localWorks = [];
let selectedMediaFiles = [];
let selectedMediaPreview = [];
let selectedAge = 0;
let currentPage = "gallery";
let activeCarouselIndex = 0;
let activeDetailId = null;

const DB = {
  async getChildren() {
    if (!currentSession) return [];
    const snap = await getDocs(collection(db, "families", currentSession.familyId, "children"));
    const list = [];
    snap.forEach(d => list.push(d.data()));
    return list;
  },
  async saveChild(childData) {
    if (!currentSession) throw new Error("ログインしていないため、子供データを保存できません。");
    await addDoc(collection(db, "families", currentSession.familyId, "children"), childData);
  },
  async getArtworks() {
    if (!currentSession) return [];
    const snap = await getDocs(collection(db, "families", currentSession.familyId, "artworks"));
    const list = [];
    snap.forEach(d => list.push(d.data()));
    return list;
  },
  async saveArtwork(artworkData) {
    if (!currentSession) throw new Error("ログインしていないため、作品を保存できません。右上のログインボタンからログインしてください。");
    await addDoc(collection(db, "families", currentSession.familyId, "artworks"), artworkData);
  }
};

/* ==========================================================================
   Authentication Logic
   ========================================================================== */
window.toggleAuth = async function() {
  if (auth.currentUser) {
    await signOut(auth);
    showToast("ログアウトしました");
  } else {
    try {
      await signInWithPopup(auth, provider);
      showToast("Googleログイン成功！");
    } catch (error) {
      alert("🛑 ログインポップアップエラー:\n" + error.message);
    }
  }
};

document.getElementById("authBtn").addEventListener("click", window.toggleAuth);

onAuthStateChanged(auth, async (user) => {
  const btnText = document.getElementById("authBtnText");
  if (user) {
    btnText.innerText = "ログアウト";
    currentSession = {
      familyId: `family_of_${user.uid}`,
      userId: user.uid,
      role: "owner"
    };
    showToast("データを読み込み中...");
    await loadChildren();
    await loadArtworks();
  } else {
    btnText.innerText = "ログイン";
    currentSession = null;
    localChildren = [];
    localWorks = [];
    renderChildList();
    populateChildSelect();
    renderGallery();
    renderTimeline();
  }
});

/* =========================
   Utility
========================= */
function showToast(message){
  const toast = document.getElementById("toast");
  if(!toast) return;
  toast.innerText = message;
  toast.classList.add("show");
  setTimeout(() => { toast.classList.remove("show"); }, 2200);
}
window.showToast = showToast;

function calculateAgeAtDate(birthday, targetDate){
  if(!birthday || !targetDate) return 0;
  const birth = new Date(birthday);
  const target = new Date(targetDate);
  let age = target.getFullYear() - birth.getFullYear();
  const monthDiff = target.getMonth() - birth.getMonth();
  if(monthDiff < 0 || (monthDiff === 0 && target.getDate() < birth.getDate())){ age--; }
  return Math.max(age, 0);
}

/* =========================
   Drawer Controls
========================= */
window.openDrawer = function(type){ document.getElementById(type+"Drawer").classList.add("open"); };
window.closeDrawer = function(type){ document.getElementById(type+"Drawer").classList.remove("open"); };

/* =========================
   Page Switch
========================= */
window.switchPage = function(page){
  currentPage = page;
  document.querySelectorAll('.page').forEach(el => el.classList.remove('active'));
  document.querySelectorAll('.nav-tab').forEach(el => el.classList.remove('active'));

  if(page === "gallery"){
    document.getElementById("galleryPage").classList.add("active");
    document.getElementById("nav-gallery").classList.add("active");
    renderGallery();
  } else {
    document.getElementById("recordsPage").classList.add("active");
    document.getElementById("nav-records").classList.add("active");
    renderTimeline();
  }
};

/* =========================
   Age Wheel
========================= */
function renderAgeWheel(){
  const wheel = document.getElementById("ageWheel");
  if(!wheel) return;
  let html = `<div style="height:88px"></div>`;
  for(let i=0; i<=99; i++){ html += `<div class="wheel-item" data-age="${i}">${i} 歳</div>`; }
  html += `<div style="height:88px"></div>`;
  wheel.innerHTML = html;
  wheel.addEventListener("scroll", onWheelScroll);
}

function onWheelScroll(){
  const wheel = document.getElementById("ageWheel");
  const items = wheel.querySelectorAll(".wheel-item");
  const center = wheel.scrollTop + 110;
  let nearest = null;
  let minDist = Infinity;

  items.forEach(item => {
    const itemCenter = item.offsetTop + 22;
    const dist = Math.abs(itemCenter - center);
    item.classList.remove("active");
    if(dist < minDist){ minDist = dist; nearest = item; }
  });

  if(nearest){
    nearest.classList.add("active");
    selectedAge = Number(nearest.dataset.age);
  }
}

function scrollAgeWheel(age){
  const wheel = document.getElementById("ageWheel");
  if(!wheel) return;
  selectedAge = age;
  wheel.scrollTo({ top: age * 44, behavior: "smooth" });
  setTimeout(onWheelScroll, 220);
}

/* =========================
   Child CRUD
========================= */
window.addChild = async function(){
  const name = document.getElementById("childName").value.trim();
  const birthday = document.getElementById("childBirthday").value;

  if(!name){ showToast("名前を入力してください"); return; }

  const child = {
    id: crypto.randomUUID(),
    name,
    birthday,
    createdAt: Date.now(),
    createdBy: currentSession?.userId || "unknown"
  };

  try {
    await DB.saveChild(child);
    localChildren.push(child);
    renderChildList();
    populateChildSelect();
    document.getElementById("childName").value = "";
    document.getElementById("childBirthday").value = "";
    showToast("子どもを追加しました");
  } catch(e) {
    alert("保存失敗: " + e.message);
  }
};

function renderChildList(){
  const container = document.getElementById("childList");
  if(!container) return;
  let html = "";
  localChildren.forEach(c => {
    html += `
      <div class="premium-card p-5 mb-3">
        <div class="flex justify-between items-center">
          <div>
            <div class="font-semibold text-lg">${c.name}</div>
            <div class="text-sm text-slate-400 mt-1">${c.birthday || "-"}</div>
          </div>
        </div>
      </div>
    `;
  });
  container.innerHTML = html;
}

function populateChildSelect(){
  const select = document.getElementById("inputWorkChild");
  if(!select) return;
  let html = `<option value="">選択してください</option>`;
  localChildren.forEach(child => { html += `<option value="${child.id}">${child.name}</option>`; });
  select.innerHTML = html;
}

document.getElementById("inputWorkChild").addEventListener("change", () => {
  const childId = document.getElementById("inputWorkChild").value;
  const child = localChildren.find(c => c.id === childId);
  const date = document.getElementById("inputDate").value;
  if(!child || !date) return;
  const age = calculateAgeAtDate(child.birthday, date);
  scrollAgeWheel(age);
});

/* =========================
   File Upload
========================= */
window.handleFileSelect = function(e){
  const files = Array.from(e.target.files || []);
  if(!files.length) return;
  if(files.length > 5){ showToast("最大5件まで登録できます"); return; }

  selectedMediaFiles = [];
  selectedMediaPreview = [];

  files.forEach(file => {
    const type = file.type.startsWith("video/") ? "video" : "image";
    const reader = new FileReader();
    reader.onload = function(evt){
      selectedMediaFiles.push({ type, base64: evt.target.result });
      selectedMediaPreview.push({ type, url: evt.target.result });
      renderMediaPreviewList();
    };
    reader.readAsDataURL(file);
  });
};

document.getElementById("fileInput").addEventListener("change", handleFileSelect);

function renderMediaPreviewList(){
  const container = document.getElementById("mediaResultContainer");
  if(!container) return;
  container.innerHTML = "";

  selectedMediaPreview.forEach(media => {
    let el = media.type === "video" ? document.createElement("video") : document.createElement("img");
    el.src = media.url;
    if(media.type === "video") el.controls = true;
    el.className = "w-full rounded-xl border border-[#E7E1D7] mb-2";
    container.appendChild(el);
  });
}

/* =========================
   Artwork Save
========================= */
document.getElementById("workForm").addEventListener("submit", saveArtwork);

async function saveArtwork(e){
  e.preventDefault();
  
  if (!currentSession) {
    alert("🔒 ログインしていません。\n右上のログインボタンからGoogleログインを行ってから保存してください。");
    return;
  }

  const title = document.getElementById("inputTitle").value.trim();
  const childId = document.getElementById("inputWorkChild").value;
  const date = document.getElementById("inputDate").value;
  const memo = document.getElementById("inputMemo").value.trim();

  if(!title){ showToast("タイトルを入力してください"); return; }

  showToast("作品をアップロード中...");
  let mediaUrls = [];
  const artworkId = crypto.randomUUID();

  try {
    if(selectedMediaFiles.length){
      let fileIndex = 1;
      for(const media of selectedMediaFiles){
        const fileExt = media.type === "video" ? "mp4" : "jpg";
        const path = `families/${currentSession.familyId}/artworks/${artworkId}/${fileIndex}.${fileExt}`;
        const storageRef = ref(storage, path);

        await uploadString(storageRef, media.base64, "data_url");
        const url = await getDownloadURL(storageRef);

        mediaUrls.push({ type: media.type, url });
        fileIndex++;
      }
    }

    const child = localChildren.find(c => c.id === childId);
    const ageAtCreated = child ? calculateAgeAtDate(child.birthday, date) : selectedAge;

    const artwork = {
      id: artworkId,
      title,
      childId,
      date,
      memo,
      ageAtCreated,
      mediaUrls,
      createdAt: Date.now(),
      createdBy: currentSession.userId,
      favorite: false,
      deleted: false
    };

    await DB.saveArtwork({ ...artwork, createdAt: serverTimestamp() });
    localWorks.push(artwork);

    renderGallery();
    renderTimeline();
    closeDrawer("work");
    showToast("作品を安全に保存しました");

    document.getElementById("workForm").reset();
    selectedMediaFiles = [];
    selectedMediaPreview = [];
    document.getElementById("mediaResultContainer").innerHTML = "";
  } catch (err) {
    alert("🛑 保存エラーが発生しました:\n" + err.message);
  }
}

/* =========================
   Gallery Render
========================= */
function renderGallery(){
  const grid = document.getElementById("galleryGrid");
  if(!grid) return;
  let html = "";
  const works = [...localWorks].sort((a,b) => b.createdAt - a.createdAt);

  works.forEach(w => {
    const child = localChildren.find(c => c.id === w.childId);
    const childName = child ? child.name : "-";
    let thumbnail = "";

    if(w.mediaUrls?.length){
      const first = w.mediaUrls[0];
      thumbnail = first.type === "video" 
        ? `<video src="${first.url}" class="w-full h-52 object-cover"></video>`
        : `<img src="${first.url}" class="w-full h-52 object-cover"/>`;
    } else {
      thumbnail = `<div class="w-full h-52 bg-slate-100 flex items-center justify-center text-xs text-slate-400">No Image</div>`;
    }

    html += `
      <div onclick="openDetailModal('${w.id}')" class="gallery-card premium-card cursor-pointer">
        ${thumbnail}
        <div class="p-4">
          <div class="text-sm text-slate-400">${w.date}</div>
          <div class="font-semibold text-base mt-2">${w.title}</div>
          <div class="mt-3 flex justify-between">
            <span class="text-sm text-slate-500">${childName}</span>
            <span class="text-sm font-medium text-[#56736C]">${w.ageAtCreated ?? '-'}歳</span>
          </div>
        </div>
      </div>
    `;
  });
  grid.innerHTML = html;
}

/* =========================
   Timeline
========================= */
function renderTimeline(){
  const container = document.getElementById("recordsTimeline");
  if(!container) return;
  let html = "";
  const works = [...localWorks].sort((a,b) => new Date(b.date) - new Date(a.date));

  works.forEach(work => {
    const child = localChildren.find(c => c.id === work.childId);
    html += `
      <div class="premium-card p-5">
        <div class="flex justify-between">
          <div>
            <div class="font-bold text-lg">${work.title}</div>
            <div class="text-sm text-slate-500 mt-1">${work.date}</div>
          </div>
          <div class="text-right">
            <div class="text-sm font-semibold">${child ? child.name : '-'}</div>
            <div class="text-xs text-slate-400">${work.ageAtCreated ?? '-'}歳</div>
          </div>
        </div>
      </div>
    `;
  });
  container.innerHTML = html;
}

/* =========================
   Detail Modal
========================= */
window.openDetailModal = function(id){
  activeDetailId = id;
  activeCarouselIndex = 0;
  const work = localWorks.find(w => w.id === id);
  if(!work) return;

  document.getElementById("detailModal").classList.add("open");
  document.getElementById("detailTitle").innerText = work.title;
  document.getElementById("detailMeta").innerText = `${work.date} / ${work.ageAtCreated}歳`;
  document.getElementById("detailMemo").innerText = work.memo || "";

  renderDetailCarousel(work);
};

window.closeDetailModal = function(){ document.getElementById("detailModal").classList.remove("open"); };

function renderDetailCarousel(work){
  const container = document.getElementById("detailCarousel");
  const dots = document.getElementById("carouselDots");
  const media = work.mediaUrls || [];

  if(!media.length){
    container.innerHTML = `<div class="w-full h-full bg-slate-200"></div>`;
    dots.innerHTML = "";
    return;
  }

  const current = media[activeCarouselIndex];
  container.innerHTML = current.type === "video"
    ? `<video src="${current.url}" controls class="w-full h-full object-contain"></video>`
    : `<img src="${current.url}" class="w-full h-full object-contain"/>`;

  let dotHtml = "";
  media.forEach((_, i) => {
    dotHtml += `
      <button onclick="jumpMedia(${i})" class="w-2.5 h-2.5 rounded-full ${
        i === activeCarouselIndex ? 'bg-white' : 'bg-white/40'
      }"></button>
    `;
  });
  dots.innerHTML = dotHtml;
}

window.prevMedia = function(){
  const work = localWorks.find(w => w.id === activeDetailId);
  if(!work?.mediaUrls?.length) return;
  activeCarouselIndex--;
  if(activeCarouselIndex < 0){ activeCarouselIndex = work.mediaUrls.length - 1; }
  renderDetailCarousel(work);
};

window.nextMedia = function(){
  const work = localWorks.find(w => w.id === activeDetailId);
  if(!work?.mediaUrls?.length) return;
  activeCarouselIndex++;
  if(activeCarouselIndex >= work.mediaUrls.length){ activeCarouselIndex = 0; }
  renderDetailCarousel(work);
};

window.jumpMedia = function(index){
  activeCarouselIndex = index;
  const work = localWorks.find(w => w.id === activeDetailId);
  if(!work) return;
  renderDetailCarousel(work);
};

/* =========================
   Firestore Load
========================= */
async function loadChildren(){
  try {
    localChildren = await DB.getChildren();
    renderChildList();
    populateChildSelect();
  } catch(e) {
    console.error("子供データのロードに失敗:", e);
  }
}

async function loadArtworks(){
  try {
    const fetchedWorks = await DB.getArtworks();
    localWorks = [];
    fetchedWorks.forEach(data => { 
      // 互換性マイグレーション
      if(!data.mediaUrls) {
        data.mediaUrls = data.mediaUrl ? [{ type: data.mediaType || "image", url: data.mediaUrl }] : [];
      }
      localWorks.push(data); 
    });
    renderGallery();
    renderTimeline();
  } catch(e) {
    console.error("作品データのロードに失敗:", e);
  }
}

   Bootstrap
========================= */
async function init(){
  try{
    renderAgeWheel();
    document.getElementById("inputDate").value = new Date().toISOString().split("T")[0];
    showToast("Kodomonote Premium 起動完了");
  } catch(err) {
    alert("初期化失敗: " + err.message);
  }
}

init();
</script>
