<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>コドomonote Premium</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{--bg:#F7F4EE;--card:#FFFFFF;--ink:#1E293B;--muted:#64748B;--accent:#7C9A92;--accent-dark:#56736C;--gold:#D6B25E;--border:#E7E1D7;--danger:#D66A5E;}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{margin:0;padding:0;background:var(--bg);color:var(--ink);font-family:'Noto Sans JP',sans-serif;}
button{cursor:pointer;}
input,select,textarea{width:100%;border:1px solid var(--border);border-radius:16px;padding:14px 16px;background:white;outline:none;}
.hidden{display:none !important;}
.page{display:none;}
.page.active{display:block;}
.glass{backdrop-filter:blur(24px);background:rgba(255,255,255,.78);}
.premium-card{background:var(--card);border:1px solid var(--border);border-radius:24px;box-shadow:0 8px 24px rgba(15,23,42,.04);}
.bottom-nav{position:fixed;left:0;right:0;bottom:0;height:84px;z-index:200;background:rgba(255,255,255,.92);backdrop-filter:blur(30px);border-top:1px solid var(--border);}
.nav-tab{color:#94A3B8;transition:.25s;}.nav-tab.active{color:var(--accent-dark);font-weight:700;}
.fab{width:68px;height:68px;border:none;border-radius:50%;color:white;font-size:34px;background:linear-gradient(135deg,var(--accent),var(--accent-dark));box-shadow:0 12px 24px rgba(86,115,108,.28);}
.drawer{position:fixed;inset:0;display:flex;align-items:flex-end;justify-content:center;background:rgba(0,0,0,.4);z-index:500;opacity:0;pointer-events:none;transition:.35s;}
.drawer.open{opacity:1;pointer-events:auto;}.drawer-panel{width:min(760px,100%);max-height:92vh;overflow:auto;background:white;border-radius:32px 32px 0 0;padding:28px;transform:translateY(60px);transition:.35s;}
.drawer.open .drawer-panel{transform:translateY(0);}
</style>
</head>
<body>

<header class="sticky top-0 z-50 px-4 py-4 glass border-b border-[#E7E1D7]">
  <div class="max-w-7xl mx-auto flex justify-between items-center">
    <div>
      <div class="text-2xl font-bold tracking-tight">Kodomonote</div>
      <div id="environmentBadge" class="text-xs font-semibold mt-1 px-2 py-0.5 rounded-full inline-block bg-rose-100 text-rose-700">Production [Fixed]</div>
    </div>
    <div class="flex gap-3 items-center">
      <button id="authBtn" class="px-4 py-2 rounded-full bg-white border border-[#E7E1D7] text-sm shadow-sm"><span id="authBtnText">ログイン</span></button>
      <button onclick="openDrawer('child')" class="w-11 h-11 rounded-full bg-white border border-[#E7E1D7] shadow-sm">⚙</button>
    </div>
  </div>
</header>

<main class="max-w-7xl mx-auto px-4 pb-32">
  <section id="galleryPage" class="page active">
    <div class="pt-6 pb-4"><h2 class="text-3xl font-bold">Gallery</h2></div>
    <div id="galleryGrid" class="grid grid-cols-2 md:grid-cols-4 gap-5"></div>
  </section>
  <section id="recordsPage" class="page">
    <div class="pt-6 pb-4"><h2 class="text-3xl font-bold">Records</h2></div>
    <div id="recordsTimeline" class="space-y-4"></div>
  </section>
</main>

<div class="bottom-nav flex justify-center items-center">
  <div class="w-full max-w-lg px-8 flex items-center justify-between">
    <button onclick="switchPage('gallery')" id="nav-gallery" class="nav-tab active flex flex-col items-center"><span class="text-xs">Gallery</span></button>
    <button onclick="openDrawer('work')" class="fab">+</button>
    <button onclick="switchPage('records')" id="nav-records" class="nav-tab flex flex-col items-center"><span class="text-xs">Records</span></button>
  </div>
</div>

<div id="workDrawer" class="drawer">
  <div class="drawer-panel">
    <div class="flex justify-between items-center mb-6"><h3 class="text-2xl font-bold">作品登録</h3><button onclick="closeDrawer('work')">✕</button></div>
    <form id="workForm" class="space-y-5">
      <div><label class="block text-sm font-semibold mb-2">タイトル</label><input id="inputTitle"/></div>
      <div><label class="block text-sm font-semibold mb-2">子ども</label><select id="inputWorkChild"></select></div>
      <div><label class="block text-sm font-semibold mb-2">日付</label><input id="inputDate" type="date"/></div>
      <div><label class="block text-sm font-semibold mb-2">メモ</label><textarea id="inputMemo"></textarea></div>
      <div>
        <input id="fileInput" type="file" accept="image/*" class="hidden"/>
        <button type="button" onclick="document.getElementById('fileInput').click()" class="w-full py-4 rounded-2xl border border-dashed border-[#CBD5E1] bg-slate-50">写真を1枚追加</button>
        <div id="mediaResultContainer" class="mt-4"></div>
      </div>
      <button type="submit" class="w-full py-4 rounded-2xl text-white font-semibold text-base bg-[#7C9A92]">保存する</button>
    </form>
  </div>
</div>

<div id="childDrawer" class="drawer">
  <div class="drawer-panel">
    <div class="flex justify-between items-center mb-6"><h3 class="text-2xl font-bold">子ども設定</h3><button onclick="closeDrawer('child')">✕</button></div>
    <div class="space-y-4">
      <input id="childName" placeholder="名前"/>
      <input id="childBirthday" type="date"/>
      <button onclick="addChild()" class="w-full py-4 rounded-2xl text-white font-semibold bg-[#7C9A92]">追加</button>
    </div>
    <div id="childList" class="mt-6"></div>
  </div>
</div>

<script type="module">
window.onerror = function(msg, url, line) {
  alert("🚨 システムエラー:\n" + msg + "\n行: " + line);
  return false;
};
window.addEventListener('unhandledrejection', function(e) {
  alert("🔥 通信・認証エラー:\n" + e.reason);
});

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
import { getStorage, ref, uploadString, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-storage.js";
import { getAuth, signInWithPopup, GoogleAuthProvider, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

// 🔒 常に本番環境（kodomonote-prod）に固定
const prodConfig = {
  apiKey: "AIzaSyAIIyoP8WvaDtHcsySKVj3UW1tXwWahBqk",
  authDomain: "kodomonote-prod.firebaseapp.com",
  projectId: "kodomonote-prod",
  storageBucket: "kodomonote-prod.firebasestorage.app"
};

const app = initializeApp(prodConfig);
const db = getFirestore(app);
const storage = getStorage(app);
const auth = getAuth(app);
const provider = new GoogleAuthProvider();

let currentSession = null;
let localChildren = [];
let localWorks = [];
let base64Image = null;

window.toggleAuth = async function() {
  if (auth.currentUser) {
    await signOut(auth);
    alert("ログアウトしました");
  } else {
    try {
      await signInWithPopup(auth, provider);
    } catch (err) {
      alert("🛑 ログインに失敗しました！\n理由: " + err.message);
    }
  }
};
document.getElementById("authBtn").addEventListener("click", window.toggleAuth);

onAuthStateChanged(auth, async (user) => {
  const btnText = document.getElementById("authBtnText");
  if (user) {
    btnText.innerText = "ログアウト";
    currentSession = { familyId: `family_of_${user.uid}`, userId: user.uid };
    alert("🔑 ログインに完全成功しました！データを同期します。");
    await loadChildren();
    await loadArtworks();
  } else {
    btnText.innerText = "ログイン";
    currentSession = null;
    localChildren = []; localWorks = [];
    renderChildList(); populateChildSelect(); renderGallery(); renderTimeline();
  }
});

window.addChild = async function(){
  if(!currentSession) { alert("🔒 ログインが完了していません。"); return; }
  const name = document.getElementById("childName").value.trim();
  const birthday = document.getElementById("childBirthday").value;
  if(!name){ alert("名前を入力してください"); return; }

  const child = { id: crypto.randomUUID(), name, birthday, createdAt: Date.now() };
  try {
    await addDoc(collection(db, "families", currentSession.familyId, "children"), child);
    localChildren.push(child);
    renderChildList();
    populateChildSelect();
    document.getElementById("childName").value = "";
    document.getElementById("childBirthday").value = "";
    alert("🎉 子どもを追加しました！");
  } catch(e) {
    alert("❌ 保存失敗: " + e.message);
  }
};

document.getElementById("fileInput").addEventListener("change", function(e){
  const file = e.target.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = function(evt){
    base64Image = evt.target.result;
    document.getElementById("mediaResultContainer").innerHTML = `<img src="${base64Image}" class="w-full rounded-xl border mb-2"/>`;
  };
  reader.readAsDataURL(file);
});

document.getElementById("workForm").addEventListener("submit", async function(e){
  e.preventDefault();
  if(!currentSession) { alert("🔒 ログインが完了していません。"); return; }
  const title = document.getElementById("inputTitle").value.trim();
  const childId = document.getElementById("inputWorkChild").value;
  const date = document.getElementById("inputDate").value;
  const memo = document.getElementById("inputMemo").value.trim();

  if(!title){ alert("タイトルを入力してください"); return; }

  let mediaUrls = [];
  const artworkId = crypto.randomUUID();

  try {
    if(base64Image){
      const path = `families/${currentSession.familyId}/artworks/${artworkId}/1.jpg`;
      const storageRef = ref(storage, path);
      await uploadString(storageRef, base64Image, "data_url");
      const url = await getDownloadURL(storageRef);
      mediaUrls.push({ type: "image", url });
    }

    const artwork = { id: artworkId, title, childId, date, memo, mediaUrls, createdAt: Date.now() };
    await addDoc(collection(db, "families", currentSession.familyId, "artworks"), artwork);
    
    localWorks.push(artwork);
    renderGallery();
    renderTimeline();
    closeDrawer("work");
    alert("✅ 作品の保存に成功しました！");

    document.getElementById("workForm").reset();
    base64Image = null;
    document.getElementById("mediaResultContainer").innerHTML = "";
  } catch(err) {
    alert("🛑 保存失敗:\n" + err.message);
  }
});

function renderChildList(){
  let html = "";
  localChildren.forEach(c => { html += `<div class="premium-card p-4 mb-2"><div class="font-semibold">${c.name}</div></div>`; });
  document.getElementById("childList").innerHTML = html;
}
function populateChildSelect(){
  let html = `<option value="">選択してください</option>`;
  localChildren.forEach(c => { html += `<option value="${c.id}">${c.name}</option>`; });
  document.getElementById("inputWorkChild").innerHTML = html;
}
function renderGallery(){
  let html = "";
  [...localWorks].sort((a,b)=>b.createdAt-a.createdAt).forEach(w => {
    let img = w.mediaUrls?.length ? `<img src="${w.mediaUrls[0].url}" class="w-full h-44 object-cover"/>` : '';
    html += `<div class="premium-card overflow-hidden">${img}<div class="p-3"><div class="font-bold">${w.title}</div></div></div>`;
  });
  document.getElementById("galleryGrid").innerHTML = html;
}
function renderTimeline(){
  let html = "";
  [...localWorks].sort((a,b)=>b.createdAt-a.createdAt).forEach(w => {
    html += `<div class="premium-card p-4"><div class="font-bold">${w.title}</div><div class="text-xs text-slate-400">${w.date}</div></div>`;
  });
  document.getElementById("recordsTimeline").innerHTML = html;
}
async function loadChildren(){ localChildren = []; const snap = await getDocs(collection(db, "families", currentSession.familyId, "children")); snap.forEach(d => localChildren.push(d.data())); renderChildList(); populateChildSelect(); }
async function loadArtworks(){ localWorks = []; const snap = await getDocs(collection(db, "families", currentSession.familyId, "artworks")); snap.forEach(d => localWorks.push(d.data())); renderGallery(); renderTimeline(); }
window.openDrawer = function(t){ document.getElementById(t+"Drawer").classList.add("open"); };
window.closeDrawer = function(t){ document.getElementById(t+"Drawer").classList.remove("open"); };
window.switchPage = function(p){
  document.querySelectorAll('.page').forEach(el => el.classList.remove('active'));
  if(p === "gallery"){ document.getElementById("galleryPage").classList.add("active"); } 
  else { document.getElementById("recordsPage").classList.add("active"); }
};
document.getElementById("inputDate").value = new Date().toISOString().split("T")[0];
</script>
</body>
</html>
