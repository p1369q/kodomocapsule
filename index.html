<script type="module">
// ...（前回のコードのインポート・設定部分はそのまま）

// 💡 変更点：ゴミ箱のデータを表示する際に、30日経過していたら削除する関数
async function cleanupOldTrash() {
  const THIRTY_DAYS_MS = 30 * 24 * 60 * 60 * 1000;
  const now = Date.now();
  
  // ゴミ箱に入っているデータだけ抽出
  const trashItems = localWorks.filter(w => w.isDeleted);
  
  for (const item of trashItems) {
    // deletedAt がない古いデータは現在時刻とみなして削除対象にするか、
    // 安全のため deletedAt が設定されてから30日経過しているか判定
    const deleteTime = item.deletedAt || now;
    if (now - deleteTime > THIRTY_DAYS_MS) {
      console.log(`期限切れのため完全削除中: ${item.title}`);
      await deleteWorkPermanently(item.id, item.title, true); // 自動削除モード
    }
  }
}

// 💡 完全にデータを削除（引数 silent=true でアラートを省略可能に）
window.deleteWorkPermanently = async function(id, title, silent = false) {
  if (!silent && !confirm(`「${title}」を完全に消去しますか？`)) return;
  
  const target = localWorks.find(w => w.id === id);
  if(!target) return;

  try {
    if(target.mediaUrls?.length) {
      for(let i=0; i<target.mediaUrls.length; i++) {
        const ext = target.mediaUrls[i].type === "pdf" ? "pdf" : "jpg";
        try { await deleteObject(ref(storage, `families/${currentSession.familyId}/artworks/${target.id}/${i}.${ext}`)); } catch(e){}
      }
    }
    await deleteDoc(doc(db, "families", currentSession.familyId, "artworks", target.docId));
    if (!silent) alert("完全に削除しました。");
    await syncData();
  } catch(err) {
    if (!silent) alert("削除失敗: " + err.message);
  }
};

// 💡 ゴミ箱ビューのレンダリングを修正
window.renderTrash = async function(){
  // 表示する前に一度掃除を行う
  await cleanupOldTrash();
  
  let html = "";
  let trashedWorks = localWorks.filter(w => w.isDeleted);
  
  trashedWorks.sort((a,b) => (b.deletedAt || 0) - (a.deletedAt || 0));

  trashedWorks.forEach(w => {
    // 経過日数計算
    const daysLeft = Math.floor((30 * 24 * 60 * 60 * 1000 - (Date.now() - (w.deletedAt || Date.now()))) / (24 * 60 * 60 * 1000));
    const label = daysLeft > 0 ? `あと${daysLeft}日で削除` : "削除期限切れ";

    let mediaPreview = w.mediaUrls?.length ? (w.mediaUrls[0].type === "pdf" ? `<div class="w-full h-32 bg-slate-100 flex items-center justify-center border-b font-bold text-2xl">📄</div>` : `<img src="${w.mediaUrls[0].url}" class="w-full h-32 object-cover"/>`) : "";
    
    html += `<div class="premium-card overflow-hidden bg-slate-50 border-dashed">
      <div class="relative opacity-60">${mediaPreview}</div>
      <div class="p-3">
        <div class="font-bold text-xs text-slate-700 line-clamp-1 mb-1">${w.title}</div>
        <div class="text-[9px] text-rose-500 mb-2 font-bold">${label}</div>
        <div class="flex gap-2">
          <button onclick="restoreWork('${w.id}')" class="text-[10px] bg-white border border-slate-200 px-2 py-1 rounded-md flex-1">戻す</button>
          <button onclick="deleteWorkPermanently('${w.id}', '${w.title}')" class="text-[10px] bg-rose-50 text-rose-600 border border-rose-200 px-2 py-1 rounded-md flex-1">消去</button>
        </div>
      </div>
    </div>`;
  });
  document.getElementById("trashGrid").innerHTML = html || "<div class='col-span-2 md:col-span-4 text-center py-12 text-slate-400 text-xs'>ゴミ箱は空っぽです</div>";
};

// ...（その他の関数もそのまま維持）
</script>
